/** 轮询单个任务直到完成或超时，支持 signal 中断 */
async function pollTask(taskId, onProgress, timeoutMs = 28800000, intervalMs = 5000, signal) {
  const start = Date.now();
  let consecutiveErrors = 0;
  while (Date.now() - start < timeoutMs) {
    if (signal?.aborted) throw new Error('已取消');
    let taskFailed = null;
    try {
      const data = await apiCall('/api/workflow/check-task', { taskId });
      consecutiveErrors = 0;
      if (onProgress) onProgress(data);
      if (data.status === 'done' || data.status === 'completed') return data;
      if (data.status === 'failed') taskFailed = data.error || '生成失败';
    } catch (e) {
      if (e.message === '已取消') throw e;
      consecutiveErrors++;
      console.warn(`pollTask 网络错误 (${consecutiveErrors}):`, e.message);
      if (consecutiveErrors > 30) throw new Error('轮询失败: 连续网络错误超过30次');
    }
    if (taskFailed) throw new Error(taskFailed);
    await new Promise(r => setTimeout(r, intervalMs));
  }
  throw new Error('生成超时（8小时）');
}

/** 恢复进行中的视频任务监控 */
async function resumePendingVideoTasks() {
  if (!currentProject) return;
  const myProject = currentProject;
  const mySwitchCount = _projectSwitchCount || 0;
  try {
    const tasks = await apiCall('/api/workflow/pending-tasks', {});
    const myTasks = tasks.filter(t => t.projectPath === currentProject);
    if (!myTasks.length) return;

    // 先处理已完成但未保存的
    for (const t of myTasks) {
      if (t.status === 'completed' && t.videoUrl) {
        const saveRes = await apiCall('/api/workflow/save-video-result', {
          projectPath: currentProject, shotIndex: t.shotIndex,
          videoUrl: t.videoUrl, taskId: t.taskId,
        });
        const localUrl = saveRes.videoUrl || t.videoUrl;
        if (cachedShots[t.shotIndex]) cachedShots[t.shotIndex].videoUrl = localUrl;
        const el = document.getElementById('inline-vid-' + t.shotIndex);
        if (el) el.innerHTML = `<video src="${escHtml(toImgSrc(localUrl))}" controls style="max-width:180px;max-height:90px;border-radius:6px;"></video>`;
        toast(`分镜${t.shotIndex + 1} 视频已恢复`);
      }
    }

    // 对仍在进行中的任务继续轮询 — 按 shotIndex 分组处理
    const activeTasks = myTasks.filter(t => t.status !== 'completed' && t.status !== 'failed' && t.status !== 'unknown');
    if (!activeTasks.length) return;

    toast(`发现 ${activeTasks.length} 个进行中的视频任务，正在恢复监控...`);
    setNodeMsg('prompts', `恢复监控 ${activeTasks.length} 个视频任务...`, true);

    // 按 shotIndex 分组
    const grouped = {};
    for (const t of activeTasks) {
      (grouped[t.shotIndex] = grouped[t.shotIndex] || []).push(t);
    }

    for (const [shotIdx, group] of Object.entries(grouped)) {
      const si = Number(shotIdx);
      const inlineVid = document.getElementById('inline-vid-' + si);
      if (!inlineVid) continue;

      if (group.length === 1) {
        // 单个任务 — 直接显示状态
        const t = group[0];
        inlineVid.innerHTML = '<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">恢复监控中...</span>';
        pollTask(t.taskId, (d) => {
          if ((_projectSwitchCount || 0) !== mySwitchCount) return;
          const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
          inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">${escHtml(txt)}</span>`;
        }).then(async (result) => {
          if ((_projectSwitchCount || 0) !== mySwitchCount) return;
          const saveRes = await apiCall('/api/workflow/save-video-result', {
            projectPath: myProject, shotIndex: si, videoUrl: result.videoUrl, taskId: t.taskId,
          });
          const localUrl = saveRes.videoUrl || result.videoUrl;
          if (cachedShots[si]) cachedShots[si].videoUrl = localUrl;
          inlineVid.innerHTML = `<video src="${escHtml(toImgSrc(localUrl))}" controls style="max-width:180px;max-height:90px;border-radius:6px;"></video>`;
        }).catch((e) => {
          inlineVid.innerHTML = `<span style="font-size:9px;color:var(--error);">❌ ${escHtml(e.message)}</span>`;
        });

      } else {
        // 多个任务 — 创建独立状态行，统一保存
        let statusHtml = '<div style="display:flex;flex-direction:column;gap:2px;margin-top:2px;">';
        group.forEach((t, ci) => {
          statusHtml += `<div id="resume-status-${si}-${ci}" style="font-size:9px;color:var(--text2);"><span class="loading-spin"></span> 视频${ci+1}: 恢复监控中...</div>`;
        });
        statusHtml += '</div>';
        inlineVid.innerHTML = statusHtml;

        let doneN = 0;
        const allResults = await Promise.allSettled(group.map(async (t, ci) => {
          if ((_projectSwitchCount || 0) !== mySwitchCount) return;
          const statusEl = document.getElementById(`resume-status-${si}-${ci}`);
          try {
            const result = await pollTask(t.taskId, (d) => {
              if ((_projectSwitchCount || 0) !== mySwitchCount) return;
              if (statusEl) {
                const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
                statusEl.innerHTML = `<span class="loading-spin"></span> 视频${ci+1}: ${escHtml(txt)}`;
              }
            });
            doneN++;
            if (statusEl) statusEl.innerHTML = `✅ 视频${ci+1}: 完成`;
            return result;
          } catch (e) {
            if (statusEl) statusEl.innerHTML = `<span style="color:var(--error);">❌ 视频${ci+1}: ${escHtml(e.message)}</span>`;
            throw e;
          }
        }));

        if ((_projectSwitchCount || 0) !== mySwitchCount) continue;

        // 统一保存所有完成的视频
        const videoUrls = [];
        const taskIds = [];
        for (const r of allResults) {
          if (r.status === 'fulfilled' && r.value?.videoUrl) {
            videoUrls.push(r.value.videoUrl);
            taskIds.push(group[allResults.indexOf(r)].taskId);
          }
        }
        if (videoUrls.length > 0) {
          const saveRes = await apiCall('/api/workflow/save-video-result', {
            projectPath: myProject, shotIndex: si,
            videoUrl: videoUrls[0], videoUrls, taskIds,
          });
          const localUrls = saveRes.videoUrls || videoUrls;
          const localUrl = saveRes.videoUrl || videoUrls[0];
          if (cachedShots[si]) {
            cachedShots[si].videoUrl = localUrl;
            cachedShots[si].videoUrls = localUrls;
          }
          inlineVid.innerHTML = localUrls.map(u =>
            `<video src="${escHtml(toImgSrc(u))}" controls style="max-width:180px;max-height:90px;border-radius:6px;"></video>`
          ).join('');
        } else {
          inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 全部失败</span>';
        }
      }
    }
  } catch (e) {
    console.error('恢复任务失败:', e);
  }
}

/** 提示词编辑时更新内存并 debounce 保存 */
let _savePromptsTimer = null;
function onPromptEdit(idx, field, value) {
  if (cachedShots[idx]) cachedShots[idx][field] = value;
  clearTimeout(_savePromptsTimer);
  _savePromptsTimer = setTimeout(() => {
    if (currentProject && cachedShots.length) {
      apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
    }
  }, 500);
}

/** 将当前 textarea 编辑同步到 cachedShots 并保存到磁盘 */
let _lastSyncTime = 0;
async function syncAndSaveShots() {
  const now = Date.now();
  if (now - _lastSyncTime < 1000) return; // 1秒内不重复保存
  _lastSyncTime = now;
  document.querySelectorAll('.prompt-ta[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    if (cachedShots[idx]) cachedShots[idx][field] = el.value;
  });
  await apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
}

/** 生成单个分镜视频（支持多个） */
const _vidAborts = {}; // shotIndex → { ac, taskIds }
function cancelVideoGen(idx) {
  const entry = _vidAborts[idx];
  if (entry) {
    entry.ac.abort();
    for (const tid of (entry.taskIds || [])) {
      apiCall('/api/workflow/cancel-task', { taskId: tid }).catch(() => {});
    }
    delete _vidAborts[idx];
  }
}
async function generateSingleVideo(shotIndex) {
  if (!requireProject()) return;
  await syncAndSaveShots();
  const vp = getItemVideoParams(shotIndex);
  const count = vp.count || videoParams.count || 1;
  const inlineVid = document.getElementById('inline-vid-' + shotIndex);
  const ac = new AbortController();
  _vidAborts[shotIndex] = { ac, taskIds: [] };
  const cancelBtn = `<button onclick="cancelVideoGen(${shotIndex})" style="background:#e74c3c;color:#fff;font-size:9px;margin-left:4px;padding:1px 6px;border-radius:3px;cursor:pointer;">取消</button>`;

  if (count === 1) {
    // 单个视频
    if (inlineVid) inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">提交中...</span>${cancelBtn}`;
    try {
      const r = await apiCall('/api/workflow/generate-video', { projectPath: currentProject, shotIndex, videoParams: vp, refMode, service: videoService });
      if (_vidAborts[shotIndex]) _vidAborts[shotIndex].taskIds.push(r.taskId);
      if (inlineVid) inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">生成中...</span>${cancelBtn}`;
      const result = await pollTask(r.taskId, (d) => {
        if (inlineVid) {
          const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
          inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">${escHtml(txt)}</span>${cancelBtn}`;
        }
      }, undefined, undefined, ac.signal);
      const saveRes = await apiCall('/api/workflow/save-video-result', { projectPath: currentProject, shotIndex, videoUrl: result.videoUrl, taskId: r.taskId });
      const localUrl = saveRes.videoUrl || result.videoUrl;
      if (cachedShots[shotIndex]) cachedShots[shotIndex].videoUrl = localUrl;
      if (inlineVid) inlineVid.innerHTML = `<video src="${escHtml(toImgSrc(localUrl))}" controls style="max-width:180px;max-height:90px;border-radius:6px;"></video>`;
      renderTimeline();
    } catch (e) {
      if (e.message === '已取消') {
        if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
      } else {
        if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ ' + escHtml(e.message) + '</span>';
        throw e;
      }
    } finally {
      delete _vidAborts[shotIndex];
    }
  } else {
    // 多个视频并行
    if (inlineVid) inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">提交${count}个视频...</span>${cancelBtn}`;
    const tasks = [];
    try {
      for (let c = 0; c < count; c++) {
        if (ac.signal.aborted) throw new Error('已取消');
        const r = await apiCall('/api/workflow/generate-video', { projectPath: currentProject, shotIndex, videoParams: vp, refMode, service: videoService });
        tasks.push(r.taskId);
        if (_vidAborts[shotIndex]) _vidAborts[shotIndex].taskIds.push(r.taskId);
      }
    } catch (e) {
      if (e.message === '已取消') {
        if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
        delete _vidAborts[shotIndex];
        return;
      }
      if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 提交失败: ' + escHtml(e.message) + '</span>';
      delete _vidAborts[shotIndex];
      throw e;
    }

    if (inlineVid) {
      let statusHtml = cancelBtn + '<div style="display:flex;flex-direction:column;gap:2px;margin-top:2px;">';
      for (let i = 0; i < count; i++) {
        statusHtml += `<div id="vid-status-${shotIndex}-${i}" style="font-size:9px;color:var(--text2);"><span class="loading-spin"></span> 视频${i+1}: 等待中...</div>`;
      }
      statusHtml += '</div>';
      inlineVid.innerHTML = statusHtml;
    }

    const videoUrls = [];
    let doneN = 0;
    const results = await Promise.allSettled(tasks.map(async (taskId, ci) => {
      const statusEl = document.getElementById(`vid-status-${shotIndex}-${ci}`);
      try {
        const result = await pollTask(taskId, (d) => {
          if (statusEl) {
            const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
            statusEl.innerHTML = `<span class="loading-spin"></span> 视频${ci+1}: ${escHtml(txt)}`;
          }
        }, undefined, undefined, ac.signal);
        doneN++;
        if (statusEl) statusEl.innerHTML = `✅ 视频${ci+1}: 完成`;
        return result;
      } catch (e) {
        if (statusEl) statusEl.innerHTML = `<span style="color:var(--error);">❌ 视频${ci+1}: ${escHtml(e.message)}</span>`;
        throw e;
      }
    }));

    for (const r of results) {
      if (r.status === 'fulfilled' && r.value?.videoUrl) videoUrls.push(r.value.videoUrl);
    }

    // 保存第一个为主视频，所有视频保存到 videoUrls 数组
    if (videoUrls.length > 0) {
      const saveRes = await apiCall('/api/workflow/save-video-result', { projectPath: currentProject, shotIndex, videoUrl: videoUrls[0], videoUrls, taskIds: tasks });
      const localUrls = saveRes.videoUrls || videoUrls;
      const localUrl = saveRes.videoUrl || videoUrls[0];
      if (cachedShots[shotIndex]) {
        cachedShots[shotIndex].videoUrl = localUrl;
        cachedShots[shotIndex].videoUrls = localUrls;
      }
      renderTimeline();
    }

    if (inlineVid) {
      if (ac.signal.aborted) {
        inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
      } else if (videoUrls.length === 0) {
        inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 全部失败</span>';
        delete _vidAborts[shotIndex];
        throw new Error('全部视频生成失败');
      } else {
        const displayUrls = (typeof localUrls !== 'undefined') ? localUrls : videoUrls;
        inlineVid.innerHTML = displayUrls.map((url, vi) =>
          `<div style="margin-bottom:4px;"><span style="font-size:9px;color:var(--text3);">#${vi+1}</span> <video src="${escHtml(toImgSrc(url))}" controls style="max-width:180px;border-radius:6px;"></video></div>`
        ).join('');
      }
    }
    delete _vidAborts[shotIndex];
  }
}

async function generateSingleVideoWithModels(shotIndex, models) {
  if (!requireProject()) return;
  await syncAndSaveShots();
  const vp = getItemVideoParams(shotIndex);
  const modelList = Array.isArray(models) && models.length ? models : [vp.model || videoParams.model || 'seedance-2.0'];
  const inlineVid = document.getElementById('inline-vid-' + shotIndex);
  const ac = new AbortController();
  _vidAborts[shotIndex] = { ac, taskIds: [] };
  const cancelBtn = `<button onclick="cancelVideoGen(${shotIndex})" style="background:#e74c3c;color:#fff;font-size:9px;margin-left:4px;padding:1px 6px;border-radius:3px;cursor:pointer;">取消</button>`;

  if (inlineVid) inlineVid.innerHTML = `<span class="loading-spin"></span> <span style="font-size:9px;color:var(--text2);">提交${modelList.length}个视频...</span>${cancelBtn}`;

  const tasks = [];
  const labels = [];
  try {
    for (const model of modelList) {
      if (ac.signal.aborted) throw new Error('已取消');
      const reqVp = { ...vp, model, count: 1 };
      const r = await apiCall('/api/workflow/generate-video', { projectPath: currentProject, shotIndex, videoParams: reqVp, refMode, service: videoService });
      tasks.push(r.taskId);
      _batchTaskIds.add(r.taskId);
      labels.push(model === 'seedance-2.0-fast' ? '2.0fast' : model === 'seedance-2.0' ? '2.0' : model);
      if (_vidAborts[shotIndex]) _vidAborts[shotIndex].taskIds.push(r.taskId);
    }
  } catch (e) {
    if (e.message === '已取消') {
      if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
      delete _vidAborts[shotIndex];
      return;
    }
    if (inlineVid) inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 提交失败: ' + escHtml(e.message) + '</span>';
    delete _vidAborts[shotIndex];
    throw e;
  }

  if (inlineVid) {
    let statusHtml = cancelBtn + '<div style="display:flex;flex-direction:column;gap:2px;margin-top:2px;">';
    for (let i = 0; i < modelList.length; i++) {
      statusHtml += `<div id="vid-status-${shotIndex}-${i}" style="font-size:9px;color:var(--text2);"><span class="loading-spin"></span> ${escHtml(labels[i])}: 等待中...</div>`;
    }
    statusHtml += '</div>';
    inlineVid.innerHTML = statusHtml;
  }

  const videoResults = [];
  const results = await Promise.allSettled(tasks.map(async (taskId, ci) => {
    const statusEl = document.getElementById(`vid-status-${shotIndex}-${ci}`);
    try {
      const result = await pollTask(taskId, (d) => {
        if (statusEl) {
          const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
          statusEl.innerHTML = `<span class="loading-spin"></span> ${escHtml(labels[ci])}: ${escHtml(txt)}`;
        }
      }, undefined, undefined, ac.signal);
      if (statusEl) statusEl.innerHTML = `✅ ${escHtml(labels[ci])}: 完成`;
      return result;
    } catch (e) {
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--error);">❌ ${escHtml(labels[ci])}: ${escHtml(e.message)}</span>`;
      throw e;
    }
  }));

  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    if (r.status === 'fulfilled' && r.value?.videoUrl) {
      videoResults.push({ url: r.value.videoUrl, label: labels[i] });
    }
  }

  let localUrls;
  if (videoResults.length > 0) {
    const rawUrls = videoResults.map(v => v.url);
    const saveRes = await apiCall('/api/workflow/save-video-result', { projectPath: currentProject, shotIndex, videoUrl: rawUrls[0], videoUrls: rawUrls, taskIds: tasks });
    localUrls = saveRes.videoUrls || rawUrls;
    const localUrl = saveRes.videoUrl || rawUrls[0];
    if (cachedShots[shotIndex]) {
      cachedShots[shotIndex].videoUrl = localUrl;
      cachedShots[shotIndex].videoUrls = localUrls;
    }
    renderTimeline();
  }

  tasks.forEach(taskId => _batchTaskIds.delete(taskId));

  if (inlineVid) {
    if (ac.signal.aborted) {
      inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
    } else if (videoResults.length === 0) {
      inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 全部失败</span>';
      delete _vidAborts[shotIndex];
      throw new Error('全部视频生成失败');
    } else {
      const displayUrls = (typeof localUrls !== 'undefined') ? localUrls : videoResults.map(v => v.url);
      inlineVid.innerHTML = displayUrls.map((url, vi) =>
        `<div style="margin-bottom:4px;"><span style="font-size:9px;color:var(--text3);">#${vi+1} ${escHtml(videoResults[vi]?.label || '')}</span> <video src="${escHtml(toImgSrc(url))}" controls style="max-width:180px;border-radius:6px;"></video></div>`
      ).join('');
    }
  }

  delete _vidAborts[shotIndex];
}

    const statusEl = document.getElementById(`vid-status-${shotIndex}-${ci}`);
    try {
      const result = await pollTask(taskId, (d) => {
        if (statusEl) {
          const txt = d.message || (d.progress ? `${d.progress}%` : '生成中...');
          statusEl.innerHTML = `<span class="loading-spin"></span> ${escHtml(labels[ci])}: ${escHtml(txt)}`;
        }
      }, undefined, undefined, ac.signal);
      if (statusEl) statusEl.innerHTML = `✅ ${escHtml(labels[ci])}: 完成`;
      return result;
    } catch (e) {
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--error);">❌ ${escHtml(labels[ci])}: ${escHtml(e.message)}</span>`;
      throw e;
    } finally {
      _batchTaskIds.delete(taskId);
    }
  }));

  for (let i = 0; i < results.length; i++) {
    const r = results[i];
    if (r.status === 'fulfilled' && r.value?.videoUrl) {
      videoResults.push({ url: r.value.videoUrl, label: labels[i] });
    }
  }

  let localUrls;
  if (videoResults.length > 0) {
    const rawUrls = videoResults.map(v => v.url);
    const saveRes = await apiCall('/api/workflow/save-video-result', { projectPath: currentProject, shotIndex, videoUrl: rawUrls[0], videoUrls: rawUrls, taskIds: tasks });
    localUrls = saveRes.videoUrls || rawUrls;
    const localUrl = saveRes.videoUrl || rawUrls[0];
    if (cachedShots[shotIndex]) {
      cachedShots[shotIndex].videoUrl = localUrl;
      cachedShots[shotIndex].videoUrls = localUrls;
    }
    renderTimeline();
  }

  if (inlineVid) {
    if (ac.signal.aborted) {
      inlineVid.innerHTML = '<span style="font-size:9px;color:var(--text3);">已取消</span>';
    } else if (videoResults.length === 0) {
      inlineVid.innerHTML = '<span style="font-size:9px;color:var(--error);">❌ 全部失败</span>';
      delete _vidAborts[shotIndex];
      throw new Error('全部视频生成失败');
    } else {
      const displayUrls = (typeof localUrls !== 'undefined') ? localUrls : videoResults.map(v => v.url);
      inlineVid.innerHTML = displayUrls.map((url, vi) =>
        `<div style="margin-bottom:4px;"><span style="font-size:9px;color:var(--text3);">#${vi+1} ${escHtml(videoResults[vi]?.label || '')}</span> <video src="${escHtml(toImgSrc(url))}" controls style="max-width:180px;border-radius:6px;"></video></div>`
      ).join('');
    }
  }

  delete _vidAborts[shotIndex];
}

/** 批量并行生成所有分镜视频 */
async function startGenerate() {
  if (!requireProject() || !requireStyle()) return;
  if (!cachedShots || !cachedShots.length) { toast('请先生成提示词', true); return; }

  await syncAndSaveShots();

  if (batchAbort) { batchAbort.abort(); batchAbort = null; }
  batchAbort = new AbortController();
  _batchTaskIds.clear();
  showStopBtn(true);
  setNodeMsg('prompts', '生成视频中...', true);
  updateNodeState('prompts', 'running');

  let doneCount = 0;
  let failCount = 0;
  const indices = cachedShots.map((_, i) => i);
  const totalCount = indices.length;

  setNodeMsg('prompts', `提交 ${totalCount} 个视频...`, true);

  const results = await Promise.allSettled(
    indices.map(async idx => {
      if (batchAbort?.signal?.aborted) return;
      await generateSingleVideo(idx);
    })
  );

  for (const r of results) {
    if (r.status === 'fulfilled') doneCount++;
    else failCount++;
  }

  showStopBtn(false);
  if (batchAbort?.signal?.aborted) {
    setNodeMsg('prompts', `⏹ 已停止 (${doneCount}/${totalCount})`);
    updateNodeState('prompts', 'idle');
  } else {
    setNodeMsg('prompts', `✅ ${doneCount}/${totalCount} 个视频` + (failCount ? ` (${failCount}失败)` : ''));
    updateNodeState('prompts', doneCount > 0 ? 'done' : 'idle');
  }
  batchAbort = null;
}

    updateNodeState('prompts', 'idle');
    batchAbort = null;
    throw e;

    submittedGroups.map(info => pollAndSaveVideoTasksForModels(info))
  );

  for (const r of results) {
    if (r.status === 'fulfilled') doneCount++;
    else failCount++;
  }

  showStopBtn(false);

    updateNodeState('prompts', okVideos > 0 ? 'done' : 'idle');
  }
  _batchTaskIds.clear();
  batchAbort = null;
}

/** 多开并发生成：先初始化所有已注册即梦账号的浏览器，然后一次性提交全部视频 */
async function startMultiBrowserGenerate() {
  if (!requireProject() || !requireStyle()) return;
  if (!cachedShots || !cachedShots.length) { toast('请先生成提示词', true); return; }

  await syncAndSaveShots();

  // 1. 初始化所有账号浏览器
  const svcLabel = videoService === 'kling' ? '可灵' : '即梦';
  const initEndpoint = videoService === 'kling' ? '/api/kling/init-all' : '/api/jimeng/init-all';
  setNodeMsg('prompts', `🚀 正在启动所有${svcLabel}浏览器...`, true);
  updateNodeState('prompts', 'running');
  try {
    const initResult = await apiCall(initEndpoint, {});
    if (!initResult.ok) { toast('浏览器启动失败: ' + (initResult.error || ''), true); return; }
    const connectedCount = initResult.results.filter(r => r.ok).length;
    setNodeMsg('prompts', `✅ ${connectedCount} 个浏览器已就绪，开始提交视频...`, true);
  } catch (e) { toast('浏览器启动失败: ' + e.message, true); return; }

  // 2. 一次性提交全部视频（后端自动负载均衡分配到各账号）
  if (batchAbort) { batchAbort.abort(); batchAbort = null; }
  batchAbort = new AbortController();
  showStopBtn(true);

  let doneCount = 0;
  let failCount = 0;
  const indices = cachedShots.map((_, i) => i);
  const totalCount = indices.length;

  // 全部一次性提交，后端的 _processVideoTaskQueue 会自动分配到不同账号
  setNodeMsg('prompts', `多开并发: 提交 ${totalCount} 个视频到所有浏览器...`, true);

  const results = await Promise.allSettled(
    indices.map(async idx => {
      if (batchAbort?.signal?.aborted) return;
      await generateSingleVideo(idx);
    })
  );

  for (const r of results) {
    if (r.status === 'fulfilled') doneCount++;
    else failCount++;
  }

  showStopBtn(false);
  if (batchAbort?.signal?.aborted) {
    setNodeMsg('prompts', `⏹ 已停止 (${doneCount}/${totalCount})`);
    updateNodeState('prompts', 'idle');
  } else {
    setNodeMsg('prompts', `✅ 多开并发完成: ${doneCount}/${totalCount} 个视频` + (failCount ? ` (${failCount}失败)` : ''));
    updateNodeState('prompts', doneCount > 0 ? 'done' : 'idle');
  }
  batchAbort = null;
}

  setOutput('script', `
    <div class="script-output">
      <div class="script-label">📄 粘贴或导入剧本</div>
      <textarea class="script-ta" id="script-input" rows="4" placeholder="粘贴剧本内容..."></textarea>
      <div class="style-selector">

        <input class="style-input" value="" oninput="setStyle(this.value)" placeholder="写实、3D动漫、赛博朋克...">
      </div>
    </div>
  `);

  requestAnimationFrame(() => { drawConnections(); fitView(); });

  // 自动加载上次打开的项目
  const _dbg = (msg) => { const el = document.getElementById('project-label'); if (el) el.textContent = msg; };
  _dbg('⏳ 正在加载...');
  fetch(API + '/api/project/history').then(r => r.json()).then(async items => {
    console.log('[init] project history:', items.length, 'items');
    if (items.length > 0) {
      _dbg('⏳ 加载: ' + items[0].name);
      currentProject = items[0].path;
      try {
        await loadProjectData();
        document.getElementById('project-label').textContent = '📂 ' + items[0].name;
        console.log('[init] project loaded OK');
      } catch (e) {
        _dbg('❌ 加载失败: ' + e.message);
        console.error('[init] loadProjectData failed:', e);
      }
    } else {
      _dbg('📂 未打开项目');
    }
  }).catch(e => { _dbg('❌ 获取历史失败: ' + e.message); console.error('[init] fetch history failed:', e); });
}
