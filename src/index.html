  updateNodeState('chapters', 'running');
  try {
    const r = await apiCall('/api/workflow/split-chapters', { projectPath: currentProject });
    setNodeMsg('chapters', `✅ ${(r.chapters || []).length} 个章节`);
    updateNodeState('chapters', 'done');
    renderChaptersOutput(r.chapters || []);

    setNodeMsg('chapters', '❌ ' + e.message);
    updateNodeState('chapters', 'idle');
  }
}

/** 立即 flush 所有 pending 的 debounce 保存 */
async function flushAllPendingSaves() {
  const saves = [];
  if (_saveChaptersTimer) {
    clearTimeout(_saveChaptersTimer); _saveChaptersTimer = null;
    if (currentProject && cachedChapters.length) saves.push(apiCall('/api/workflow/save-chapters', { projectPath: currentProject, chapters: cachedChapters }));
  }
  if (_saveAnalysisTimer) {
    clearTimeout(_saveAnalysisTimer); _saveAnalysisTimer = null;
    if (currentProject && cachedAnalysis) saves.push(apiCall('/api/workflow/save-analysis', { projectPath: currentProject, analysis: cachedAnalysis }));
  }
  if (_saveShotPlansTimer) {
    clearTimeout(_saveShotPlansTimer); _saveShotPlansTimer = null;
    if (currentProject && cachedShotPlans.length) saves.push(apiCall('/api/workflow/save-shot-plans', { projectPath: currentProject, shotPlans: cachedShotPlans }));
  }
  if (_savePromptsTimer) {
    clearTimeout(_savePromptsTimer); _savePromptsTimer = null;
    if (currentProject && cachedShots.length) {
      document.querySelectorAll('.prompt-ta[data-idx]').forEach(el => {
        const idx = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        if (cachedShots[idx]) cachedShots[idx][field] = el.value;
      });
      saves.push(apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots }));
    }
  }
  if (saves.length) await Promise.all(saves);
}

async function saveProject() {
  if (!currentProject) { toast('请先创建或打开项目', true); return; }
  try {
    await flushAllPendingSaves();
    // 强制保存各步骤数据（即使 debounce timer 未触发）
    const saves2 = [];
    if (cachedAnalysis) saves2.push(apiCall('/api/workflow/save-analysis', { projectPath: currentProject, analysis: cachedAnalysis }));
    if (cachedShotPlans.length) saves2.push(apiCall('/api/workflow/save-shot-plans', { projectPath: currentProject, shotPlans: cachedShotPlans }));
    if (cachedShots.length) {
      document.querySelectorAll('.prompt-ta[data-idx]').forEach(el => {
        const idx = parseInt(el.dataset.idx);
        const field = el.dataset.field;
        if (cachedShots[idx]) cachedShots[idx][field] = el.value;
      });
      saves2.push(apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots }));
    }
    if (saves2.length) await Promise.all(saves2);
    toast('✅ 项目已保存');
  } catch (e) {
    toast('❌ 保存失败: ' + e.message, true);
  }
}

let _saveChaptersTimer = null;
function saveChaptersDebounced() {
  clearTimeout(_saveChaptersTimer);
  _saveChaptersTimer = setTimeout(() => {
    if (currentProject && cachedChapters.length) {
      apiCall('/api/workflow/save-chapters', { projectPath: currentProject, chapters: cachedChapters });
    }
  }, 500);
}

function updateChapterContent(idx, value) {
  if (cachedChapters[idx]) {
    cachedChapters[idx].content = value;
    saveChaptersDebounced();
  }
}

function renderChaptersOutput(chapters) {
  cachedChapters = chapters;
  setNodeExtra('chapters', `<div style="color:var(--success);">✓ ${chapters.length} 个章节</div>`);
  setOutput('chapters', `
    <div class="output-single">
      ${chapters.map((ch, i) => `
        <div class="output-card">
          <strong>章节 ${i + 1}</strong>
          <div style="font-size:11px;color:var(--text2);margin-top:2px;">${escHtml(ch.title || ch.scene || '')}</div>
          <textarea class="prompt-ta" rows="3" style="margin-top:4px;" oninput="updateChapterContent(${i},this.value)">${escHtml(ch.content || ch.description || '')}</textarea>
        </div>
      `).join('')}
    </div>
  `);
}

let _saveAnalysisTimer = null;
function saveAnalysisDebounced() {
  clearTimeout(_saveAnalysisTimer);
  _saveAnalysisTimer = setTimeout(() => {
    if (currentProject && cachedAnalysis) {
      apiCall('/api/workflow/save-analysis', { projectPath: currentProject, analysis: cachedAnalysis });
    }
  }, 500);
}

function updateAnalysisDesc(cat, idx, value) {
  if (cachedAnalysis && cachedAnalysis[cat] && cachedAnalysis[cat][idx]) {
    cachedAnalysis[cat][idx].description = value;
    saveAnalysisDebounced();
  }
}

function renderAnalysisOutput(d) {
  const chars = (d.characters || []);
  const scenes = (d.scenes || []);
  const props = (d.props || []);
  setNodeExtra('analyze', `<div style="color:var(--success);">✓ ${chars.length}角色 ${scenes.length}场景 ${props.length}道具</div>`);

  const renderCol = (items, cat) => items.map((i, idx) =>
    `<div class="output-card" style="position:relative;">
      <button onclick="deleteAnalysisItem('${cat}',${idx})" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:12px;padding:0 4px;opacity:.5;" onmouseenter="this.style.opacity=1;this.style.color='#e74c3c'" onmouseleave="this.style.opacity=.5;this.style.color='var(--text2)'" title="删除">✕</button>
      <strong>${escHtml(i.name)}</strong>
      <textarea class="prompt-ta" rows="2" style="margin-top:4px;" oninput="updateAnalysisDesc('${cat}',${idx},this.value)">${escHtml(i.description || '')}</textarea>
      <button class="node-btn node-btn-secondary" onclick="openAnalysisDetail('${cat}',${idx})" style="font-size:10px;padding:2px 8px;margin-top:4px;">📋 查看详情</button>
    </div>`
  ).join('');

  setOutput('analyze', `
    <div class="output-columns">
      <div class="output-col">
        <div class="output-col-head" style="display:flex;justify-content:space-between;align-items:center;">
          <span>👤 角色 (${chars.length})</span>
          <button class="node-btn node-btn-secondary" onclick="addAnalysisItem('characters')" style="font-size:10px;padding:2px 8px;">➕ 添加</button>
        </div>
        ${renderCol(chars, 'characters')}
      </div>
      <div class="output-col">
        <div class="output-col-head" style="display:flex;justify-content:space-between;align-items:center;">
          <span>🏠 场景 (${scenes.length})</span>
          <button class="node-btn node-btn-secondary" onclick="addAnalysisItem('scenes')" style="font-size:10px;padding:2px 8px;">➕ 添加</button>
        </div>
        ${renderCol(scenes, 'scenes')}
      </div>
      <div class="output-col">
        <div class="output-col-head" style="display:flex;justify-content:space-between;align-items:center;">
          <span>🔧 道具 (${props.length})</span>
          <button class="node-btn node-btn-secondary" onclick="addAnalysisItem('props')" style="font-size:10px;padding:2px 8px;">➕ 添加</button>
        </div>
        ${renderCol(props, 'props')}
      </div>
    </div>
  `);
}

function addAnalysisItem(cat) {
  if (!cachedAnalysis) cachedAnalysis = {};
  if (!cachedAnalysis[cat]) cachedAnalysis[cat] = [];
  const catLabel = { characters: '角色', scenes: '场景', props: '道具' }[cat] || cat;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = `
    <div style="background:#1e1e32;border:1px solid var(--border);border-radius:12px;padding:20px;width:360px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);">
      <div style="margin-bottom:12px;font-size:14px;">请输入${catLabel}名称：</div>
      <input id="_addItemInput" type="text" style="width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:#12121e;color:var(--text);font-size:13px;outline:none;box-sizing:border-box;" autofocus />
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end;">
        <button class="node-btn node-btn-secondary" id="_addItemCancel" style="font-size:12px;padding:4px 14px;">取消</button>
        <button class="node-btn node-btn-primary" id="_addItemOk" style="font-size:12px;padding:4px 14px;">确定</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  const inp = document.getElementById('_addItemInput');
  inp.focus();
  const doAdd = () => {
    const name = inp.value.trim();
    overlay.remove();
    if (!name) return;
    const newItem = { name, description: '' };
    if (cat === 'characters') newItem.gender = '';
    cachedAnalysis[cat].push(newItem);
    renderAnalysisOutput(cachedAnalysis);
    renderImagesFromCache();
    if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
    saveAnalysisDebounced();
    toast(`已添加${catLabel}：${name}`);
  };
  document.getElementById('_addItemOk').onclick = doAdd;
  document.getElementById('_addItemCancel').onclick = () => overlay.remove();
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); if (e.key === 'Escape') overlay.remove(); });
}

function deleteAnalysisItem(cat, idx) {
  if (!cachedAnalysis?.[cat]?.[idx]) return;
  const catLabel = { characters: '角色', scenes: '场景', props: '道具' }[cat] || cat;
  const name = cachedAnalysis[cat][idx].name;
  cachedAnalysis[cat].splice(idx, 1);

  // 同步删除参考图
  if (cachedRefImages[cat]?.[name]) {
    delete cachedRefImages[cat][name];
    apiCall('/api/workflow/delete-ref-image', { projectPath: currentProject, category: cat, name }).catch(() => {});
  }

  // 同步清理分镜中对已删除项的引用
  if (cachedShotPlans.length) {
    for (const sp of cachedShotPlans) {
      if (cat === 'scenes' && sp.scene === name) sp.scene = '';
      if (cat === 'characters' && sp.characters) sp.characters = sp.characters.filter(c => c !== name);
      if (cat === 'props' && sp.props) sp.props = sp.props.filter(p => p !== name);
    }
  }
  if (cachedShots.length) {
    for (const sh of cachedShots) {
      if (cat === 'scenes' && sh.scene === name) sh.scene = '';
      if (cat === 'characters' && sh.characters) sh.characters = sh.characters.filter(c => c !== name);
      if (cat === 'props' && sh.props) sh.props = sh.props.filter(p => p !== name);
    }
  }

  renderAnalysisOutput(cachedAnalysis);
  renderImagesFromCache();
  if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
  saveAnalysisDebounced();
  if (cachedShotPlans.length) saveShotPlansDebounced();
  toast(`已删除${catLabel}：${name}`);
}

function openAnalysisDetail(cat, idx) {
  const item = cachedAnalysis?.[cat]?.[idx];
  if (!item) return;
  const catLabel = { characters: '👤 角色', scenes: '🏠 场景', props: '🔧 道具' }[cat] || cat;

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.addEventListener('close', () => overlay.remove());
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const box = document.createElement('div');
  box.style.cssText = 'background:#1e1e32;border:1px solid var(--border);border-radius:12px;padding:20px;width:600px;max-height:80vh;display:flex;flex-direction:column;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);';
  box.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="margin:0;color:var(--accent);">${catLabel} — ${escHtml(item.name)}</h3>
      <button class="node-btn node-btn-secondary" onclick="this.closest('div[style*=fixed]').remove()" style="font-size:11px;padding:3px 10px;">✕ 关闭</button>
    </div>
    <div style="margin-bottom:8px;font-size:11px;color:var(--text2);">编辑描述内容：</div>
    <textarea id="analysis-detail-ta" class="p-input" style="flex:1;min-height:300px;resize:vertical;font-size:13px;line-height:1.6;font-family:inherit;white-space:pre-wrap;">${escHtml(item.description || '')}</textarea>
    <div style="display:flex;justify-content:flex-end;margin-top:10px;gap:8px;">
      <button class="node-btn node-btn-primary" onclick="saveAnalysisDetail('${cat}',${idx});this.closest('div[style*=fixed]').remove();toast('已保存');">💾 保存并关闭</button>
    </div>
  `;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  overlay.querySelector('#analysis-detail-ta').focus();
}

function saveAnalysisDetail(cat, idx) {
  const ta = document.getElementById('analysis-detail-ta');
  if (!ta || !cachedAnalysis?.[cat]?.[idx]) return;
  cachedAnalysis[cat][idx].description = ta.value;
  // 同步更新卡片中的 textarea
  const cards = document.querySelectorAll(`#output-analyze .output-col`);
  const catIndex = { characters: 0, scenes: 1, props: 2 }[cat];
  if (cards[catIndex]) {
    const cardTas = cards[catIndex].querySelectorAll('.prompt-ta');
    if (cardTas[idx]) cardTas[idx].value = ta.value;
  }
  saveAnalysisDebounced();
}

// ============================
// 步骤3：分镜
// ============================
async function runStep3() {
  if (!requireProject() || !requireStyle()) return;
  await flushAllPendingSaves();
  await loadRefImages();
  setNodeMsg('shots', '生成分镜中...', true);
  updateNodeState('shots', 'running');
  try {
    // 自动拆分章节（如果未拆分）
    try {
      await apiCall('/api/workflow/split-chapters', { projectPath: currentProject, skipIfExists: true });
    } catch (chErr) {
      console.warn('章节拆分失败:', chErr.message);
    }
    const r = await apiCall('/api/workflow/plan-shots', { projectPath: currentProject, shotDuration: 5 });
    setNodeMsg('shots', `✅ ${r.shotCount} 个分镜`);
    updateNodeState('shots', 'done');
    renderShotsOutput(r.shots);
  } catch (e) {
    setNodeMsg('shots', '❌ ' + e.message);
    updateNodeState('shots', 'idle');
  }
}

async function runConvertScript() {
  if (!requireProject()) return;
  await flushAllPendingSaves();
  const presetName = selectedPresetIdx >= 0 && convertPresets[selectedPresetIdx]
    ? convertPresets[selectedPresetIdx].name : '默认';
  const isSegmented = selectedPresetIdx >= 0 && convertPresets[selectedPresetIdx]
    && /\{\{前面文案\}\}|\{\{前面分镜|\{\{后面分镜/.test(convertPresets[selectedPresetIdx].user || '');
  setNodeMsg('shots', `转换中（${escHtml(presetName)}${isSegmented ? '，逐段模式' : ''}）...`, true);
  updateNodeState('shots', 'running');
  try {
    const r = await apiCall('/api/workflow/convert-script', {
      projectPath: currentProject,
      presetIndex: selectedPresetIdx,
    });
    setNodeMsg('shots', `✅ ${r.shotCount} 个分镜（转换）`);
    updateNodeState('shots', 'done');
    renderShotsOutput(r.shots);
  } catch (e) {
    setNodeMsg('shots', '❌ ' + e.message);
    updateNodeState('shots', 'idle');
  }
}

/** 加载转换预设列表并刷新下拉框 */
async function loadConvertPresets() {
  try {
    const r = await fetch(API + '/api/convert-presets').then(r => r.json());
    convertPresets = r.presets || [];
  } catch { convertPresets = []; }
  refreshPresetDropdown();
}

function refreshPresetDropdown() {
  const sel = document.getElementById('sel-convert-preset');
  if (!sel) return;
  sel.innerHTML = '<option value="-1">剧本转换默认</option>' +
    convertPresets.map((p, i) => `<option value="${i}" ${i===selectedPresetIdx?'selected':''}>${escHtml(p.name)}</option>`).join('');
}

/** 预设管理弹窗 */
function manageConvertPresets() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.onclick = e => { if (e.target === overlay) overlay.remove(); };

  const box = document.createElement('div');
  box.style.cssText = 'background:#1e1e32;border:1px solid var(--border);border-radius:12px;padding:20px;width:640px;max-height:80vh;overflow-y:auto;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);';

  function renderPresetList() {
    box.innerHTML = `
      <h3 style="margin:0 0 12px;color:var(--accent);">📋 转换提示词预设</h3>

  const sel = document.getElementById('sel-promptgen-preset');

  const defaultOpt = `<option value="-1" ${-1===selectedPromptGenPresetIdx?'selected':''}>默认</option>`;

  const builtinOpts = builtinNames.map((name, i) => {

    return `<option value="${val}" ${val===selectedPromptGenPresetIdx?'selected':''}>${escHtml(name)}</option>`;

  const customOpts = promptGenPresets.map((p, i) => `<option value="${i}" ${i===selectedPromptGenPresetIdx?'selected':''}>${escHtml(p.name)}</option>`).join('');

function showPromptDetail(idx, field) {
  const s = cachedShots[idx];

  const isVideo = field === 'videoPrompt';

    onPromptEdit(idx, field, ta.value);

function saveCompareEdits() {
  const idxA = window._compareIdxA, idxB = window._compareIdxB, field = window._compareField;
  const taA = document.getElementById('compare-ta-a');
  const taB = document.getElementById('compare-ta-b');
  if (taA && cachedShots[idxA]) { cachedShots[idxA][field] = taA.value; onPromptEdit(idxA, field, taA.value); }
  if (taB && cachedShots[idxB]) { cachedShots[idxB][field] = taB.value; onPromptEdit(idxB, field, taB.value); }
  [idxA, idxB].forEach(i => {
    const card = document.getElementById('prompt-card-' + i);
    if (card) { const ta = card.querySelector(`textarea[data-field="${field}"]`); if (ta) ta.value = cachedShots[i][field]; }
  });
}

function navigateCompare(dir) {
  saveCompareEdits();
  const field = window._compareField;
  let idxA = window._compareIdxA, idxB = window._compareIdxB;
  if (dir === 'prev' && idxA > 0) { idxA--; idxB--; }
  else if (dir === 'next' && idxB < cachedShots.length - 1) { idxA++; idxB++; }
  else return;
  // 移除旧overlay，重新创建
  const old = document.getElementById('prompt-compare-overlay');
  if (old) old.remove();
  showPromptCompare(idxA, idxB, field);
}

function closePromptCompare() {
  saveCompareEdits();
  const overlay = document.getElementById('prompt-compare-overlay');

  apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots }).then(() => toast('提示词已保存')).catch(() => {});

// toggleContRef: 支持连续查看(a/b)和对比模式(cmp-a/cmp-b)的参考图切换
function toggleContRef(side, type, name) {
  // 判断是对比模式还是连续查看模式
  const isCompare = side.startsWith('cmp-');
  let shotIdx;
  if (isCompare) {
    shotIdx = side === 'cmp-a' ? window._compareIdxA : window._compareIdxB;
  } else {
    shotIdx = side === 'a' ? _contActiveIdx : _contActiveIdx + 1;
  }

  if (type === 'char') {
    const chars = cachedShots[shotIdx]?.characters || [];
    toggleShotChar(shotIdx, name, !chars.includes(name));
  } else if (type === 'scene') {
    const current = cachedShots[shotIdx]?.scene || '';
    updateShotField(shotIdx, 'scene', current === name ? '' : name);
  } else if (type === 'prop') {
    const props = cachedShots[shotIdx]?.props || [];
    toggleShotProp(shotIdx, name, !props.includes(name));
  }
  const el = document.getElementById('cont-refs-' + side);
  if (el) el.outerHTML = getContRefEditHtml(shotIdx, side);
}

/** 对齐 Step4 与 Step5 分镜卡片高度，使每个镜头头部水平对齐 */
function alignShotAndPromptCards() {
  requestAnimationFrame(() => {
    const shotsOutput = document.getElementById('output-shots');
    const promptsOutput = document.getElementById('output-prompts');
    if (!shotsOutput || !promptsOutput) return;
    if (!shotsOutput.classList.contains('visible') || !promptsOutput.classList.contains('visible')) return;
    const shotCards = shotsOutput.querySelectorAll('.shot-card');
    const promptCards = promptsOutput.querySelectorAll('.prompt-card');
    if (!shotCards.length || !promptCards.length) return;
    const count = Math.min(shotCards.length, promptCards.length);

    // 重置之前的对齐
    shotsOutput.style.paddingTop = '';
    promptsOutput.style.paddingTop = '';
    for (let i = 0; i < count; i++) {
      shotCards[i].style.minHeight = '';
      promptCards[i].style.minHeight = '';
      const ta = shotCards[i].querySelector('.prompt-ta');
      if (ta) ta.style.height = '';
    }

    requestAnimationFrame(() => {
      // 用 offsetTop 计算输出区域在各自节点内的起始偏移
      const shotOutputTop = shotsOutput.offsetTop;
      const promptOutputTop = promptsOutput.offsetTop;
      const diff = shotOutputTop - promptOutputTop;
      if (diff > 0) promptsOutput.style.paddingTop = diff + 'px';
      else if (diff < 0) shotsOutput.style.paddingTop = (-diff) + 'px';

      // 等高每对卡片
      for (let i = 0; i < count; i++) {
        const sh = shotCards[i].offsetHeight;
        const ph = promptCards[i].offsetHeight;
        const max = Math.max(sh, ph);
        shotCards[i].style.minHeight = max + 'px';
        promptCards[i].style.minHeight = max + 'px';
      }
      // 拉伸 Step 4 textarea 填满卡片
      requestAnimationFrame(() => {
        for (let i = 0; i < count; i++) {
          const card = shotCards[i];
          const ta = card.querySelector('.prompt-ta');
          if (!ta) continue;
          const cardH = card.clientHeight;
          const cardPad = 12; // padding top+bottom
          // 计算 textarea 上方元素的总高度
          let above = 0;
          for (const child of card.children) {
            if (child === ta) break;
            above += child.offsetHeight + (parseFloat(getComputedStyle(child).marginTop) || 0) + (parseFloat(getComputedStyle(child).marginBottom) || 0);
          }
          // 计算 textarea 下方元素
          let below = 0;
          let foundTa = false;
          for (const child of card.children) {
            if (child === ta) { foundTa = true; continue; }
            if (foundTa) below += child.offsetHeight + (parseFloat(getComputedStyle(child).marginTop) || 0) + (parseFloat(getComputedStyle(child).marginBottom) || 0);
          }
          const taH = cardH - above - below - cardPad;
          if (taH > 50) ta.style.height = taH + 'px';
        }
      });
    });
  });
}

let _saveShotPlansTimer = null;
function saveShotPlansDebounced() {
  clearTimeout(_saveShotPlansTimer);
  _saveShotPlansTimer = setTimeout(() => {
    if (currentProject && cachedShotPlans.length) {
      apiCall('/api/workflow/save-shot-plans', { projectPath: currentProject, shotPlans: cachedShotPlans });
      // 同步保存 shots.json（角色/场景/道具以 Step 4 为准）
      if (cachedShots.length) {
        apiCall('/api/workflow/save-shots', { projectPath: currentProject, shots: cachedShots });
      }
    }
  }, 500);
}

function updateShotField(idx, field, value) {
  if (cachedShotPlans[idx]) {
    cachedShotPlans[idx][field] = value;
    // 编辑 content 时清空 background，防止重新渲染时重复拼接
    if (field === 'content') cachedShotPlans[idx].background = '';
  }
  // 同步关键字段到 cachedShots
  if (cachedShots[idx] && (field === 'scene' || field === 'characters' || field === 'props' || field === 'content')) {
    cachedShots[idx][field] = value;
  }
  if (field === 'scene' || field === 'characters' || field === 'props') refreshShotRefs(idx);
  saveShotPlansDebounced();
}

function toggleShotChar(idx, charName, checked) {
  if (!cachedShotPlans[idx]) return;
  if (!cachedShotPlans[idx].characters) cachedShotPlans[idx].characters = [];
  const chars = cachedShotPlans[idx].characters;
  if (checked && !chars.includes(charName)) chars.push(charName);
  if (!checked) cachedShotPlans[idx].characters = chars.filter(c => c !== charName);
  // 同步到 cachedShots
  if (cachedShots[idx]) cachedShots[idx].characters = [...(cachedShotPlans[idx].characters || [])];
  refreshShotRefs(idx);
  saveShotPlansDebounced();
}

function toggleShotProp(idx, propName, checked) {
  if (!cachedShotPlans[idx]) return;
  if (!cachedShotPlans[idx].props) cachedShotPlans[idx].props = [];
  const props = cachedShotPlans[idx].props;
  if (checked && !props.includes(propName)) props.push(propName);
  if (!checked) cachedShotPlans[idx].props = props.filter(p => p !== propName);
  // 同步到 cachedShots
  if (cachedShots[idx]) cachedShots[idx].props = [...(cachedShotPlans[idx].props || [])];
  refreshShotRefs(idx);
  saveShotPlansDebounced();
}

function refreshShotRefs(idx) {
  // 刷新 Step 4 卡片的参考图
  const card = document.querySelectorAll('.shot-card')[idx];
  if (card) {
    const refEl = card.querySelector('.shot-refs');
    const newHtml = getShotRefHtml(cachedShotPlans[idx]);
    if (refEl) refEl.outerHTML = newHtml || '<span></span>';
    else if (newHtml) card.insertAdjacentHTML('beforeend', newHtml);
    // 同步 Step 4 卡片中的角色/道具 checkbox 和场景 select
    const shot = cachedShotPlans[idx];
    if (shot) {
      const shotChars = shot.characters || [];
      card.querySelectorAll('input[type="checkbox"]').forEach(cb => {
        const m = cb.getAttribute('onchange');
        if (!m) return;
        const cm = m.match(/toggleShotChar\(\d+,'([^']+)'/);
        if (cm) cb.checked = shotChars.includes(cm[1]);
        const pm = m.match(/toggleShotProp\(\d+,'([^']+)'/);
        if (pm) cb.checked = (shot.props || []).includes(pm[1]);
      });
      card.querySelectorAll('select').forEach(sel => {
        const sm = (sel.getAttribute('onchange') || '').match(/updateShotField\(\d+,'scene'/);
        if (sm) sel.value = shot.scene || '';
      });
    }
  }
  // 实时刷新 Step 5 对应 prompt 卡片的 ref badges
  const promptCard = document.querySelectorAll('.prompt-card')[idx];
  if (promptCard && cachedShots[idx]) {
    const refsEl = promptCard.querySelector('.pc-head-refs');
    if (refsEl) refsEl.innerHTML = getRefBadgesHtml(cachedShots[idx]);
  }
}

function showStopBtn(show) {
  const btn = document.getElementById('btn-stop-batch');
  if (btn) btn.style.display = show ? '' : 'none';
}
function stopBatch() {
  if (batchAbort) { batchAbort.abort(); batchAbort = null; }
  for (const idx of Object.keys(_vidAborts)) {
    const entry = _vidAborts[idx];
    if (!entry) continue;
    entry.ac.abort();
    for (const tid of (entry.taskIds || [])) {
      apiCall('/api/workflow/cancel-task', { taskId: tid }).catch(() => {});
    }
    delete _vidAborts[idx];
  }
  for (const taskId of _batchTaskIds) {
    apiCall('/api/workflow/cancel-task', { taskId }).catch(() => {});
  }
  _batchTaskIds.clear();
  showStopBtn(false);
  setNodeMsg('prompts', '⏹ 已停止');
  updateNodeState('prompts', 'idle');
  toast('已停止批量操作');
}

async function runStep4() {
  if (!requireProject() || !requireStyle()) return;
  await flushAllPendingSaves();
  if (batchAbort) { batchAbort.abort(); batchAbort = null; }
  batchAbort = new AbortController();
  showStopBtn(true);
  const pgPresetName = selectedPromptGenPresetIdx >= 0 && promptGenPresets[selectedPromptGenPresetIdx]
    ? promptGenPresets[selectedPromptGenPresetIdx].name
    : (selectedPromptGenPresetIdx <= -2 && window._builtinGenNames && window._builtinGenNames[(-selectedPromptGenPresetIdx) - 1])
      ? window._builtinGenNames[(-selectedPromptGenPresetIdx) - 1]
      : (window._builtinGenNames && window._builtinGenNames[0]) || '默认';
  setNodeMsg('prompts', `生成中（${escHtml(pgPresetName)}，逐个推送）...`, true);
  updateNodeState('prompts', 'running');
  cachedShots = [];
  setOutput('prompts', '<div class="output-single" id="prompts-stream"></div>');

  try {
    const resp = await fetch(API + '/api/workflow/generate-prompts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectPath: currentProject, presetIndex: selectedPromptGenPresetIdx }),
      signal: batchAbort?.signal,
    });

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let data;
        try { data = JSON.parse(line.slice(6)); } catch { console.warn('SSE解析跳过:', line); continue; }
        if (data.type === 'shot') {
          cachedShots[data.index] = data.shot;
          setNodeMsg('prompts', `生成中 ${data.index + 1}/${data.total}...`, true);
          appendPromptCard(data.shot, data.index);
          if (data.error) toast(`镜头 ${data.shot.shotNumber} 提示词生成失败`, true);
        } else if (data.type === 'done') {
          cachedShots = data.shots;
          setNodeMsg('prompts', `✅ ${data.shots.length} 个提示词`);
          updateNodeState('prompts', 'done');
          setNodeExtra('prompts', `<div style="color:var(--success);">✓ ${data.shots.length} 个提示词</div>`);
          showStopBtn(false);
        } else if (data.type === 'error') {
          throw new Error(data.error);
        }
      }
    }
  } catch (e) {
    if (e.name === 'AbortError') { toast('提示词生成已停止'); }
    else { setNodeMsg('prompts', '❌ ' + e.message); }
    updateNodeState('prompts', 'idle');
    showStopBtn(false);
  }
}

/** 从 videoPrompt 文本中提取引用的场景/角色/物品名称 */
function parseVideoPromptRefs(text) {
  const result = { characters: [], scenes: [], props: [] };
  if (!text) return result;
  // 匹配 "场景：xxx" 行
  const sceneM = text.match(/^场景[：:]\s*(.+)/m);
  if (sceneM) result.scenes.push(sceneM[1].replace(/[。\s]+$/, '').trim());
  // 匹配 "角色：xxx" 行
  const charM = text.match(/^角色[：:]\s*(.+)/m);
  if (charM) charM[1].replace(/[。\s]+$/, '').split(/[、，,]/).forEach(n => { const t = n.trim(); if (t) result.characters.push(t); });
  // 匹配 "物品：xxx" 行
  const propM = text.match(/^物品[：:]\s*(.+)/m);
  if (propM) propM[1].replace(/[。\s]+$/, '').split(/[、，,]/).forEach(n => { const t = n.trim(); if (t) result.props.push(t); });
  return result;
}

/** 生成分镜参考图引用状态 HTML */
function getContRefEditHtml(shotIdx, side) {
  const shot = cachedShots[shotIdx];
  if (!shot) return '';

  const allChars = (cachedAnalysis?.characters || []).map(c => c.name);
  const allScenes = (cachedAnalysis?.scenes || []).map(s => s.name);
  const allProps = (cachedAnalysis?.props || []).map(p => p.name);

  if (!allChars.length && !allScenes.length && !allProps.length) return '';

  const refChars = cachedRefImages.characters || {};
  const refScenes = cachedRefImages.scenes || {};
  const refProps = cachedRefImages.props || {};

  const shotChars = shot.characters || [];
  const shotScene = shot.scene || '';
  const shotProps = shot.props || [];

  function makeTag(name, isActive, hasRef, type) {
    const cls = ['cont-ref-edit-tag', isActive ? 'active' : '', hasRef ? 'has-ref' : ''].filter(Boolean).join(' ');
    return `<span class="${cls}" onclick="toggleContRef('${side}','${type}','${escHtml(name)}')">${escHtml(name)}</span>`;
  }

  let html = `<div class="cont-ref-section" id="cont-refs-${side}">`;
  html += '<div class="cont-ref-title">📎 参考图引用</div>';
  if (allChars.length) {
    html += `<div class="cont-ref-row"><span class="cont-ref-cat">👤 角色</span>${allChars.map(n =>
      makeTag(n, shotChars.includes(n), !!refChars[n], 'char')
    ).join('')}</div>`;
  }
  if (allScenes.length) {
    html += `<div class="cont-ref-row"><span class="cont-ref-cat">🏠 场景</span>${allScenes.map(n => {
      const url = refScenes[n] || Object.entries(refScenes).find(([k]) => n.includes(k) || k.includes(n))?.[1];
      const isActive = shotScene === n || (shotScene && (n.includes(shotScene) || shotScene.includes(n)));
      return makeTag(n, isActive, !!url, 'scene');
    }).join('')}</div>`;
  }
  if (allProps.length) {
    html += `<div class="cont-ref-row"><span class="cont-ref-cat">🔧 道具</span>${allProps.map(n =>
      makeTag(n, shotProps.includes(n), !!refProps[n], 'prop')
    ).join('')}</div>`;
  }
  html += '</div>';
  return html;
}

/** 生成单个分镜关键帧图片（每个分镜使用 imagePrompt + 关联参考图信息） */
async function generateKeyFrames() {
  if (!requireProject() || !requireStyle()) return;
  if (!cachedShots || !cachedShots.length) { toast('请先生成提示词', true); return; }
  // 先保存当前编辑
  document.querySelectorAll('.prompt-ta[data-idx]').forEach(el => {
    const idx = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    if (cachedShots[idx]) cachedShots[idx][field] = el.value;
  });
  await apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });

  if (batchAbort) { batchAbort.abort(); batchAbort = null; }
  batchAbort = new AbortController();
  showStopBtn(true);
  setNodeMsg('prompts', '生成关键帧图片中...', true);
  updateNodeState('prompts', 'running');

  let doneCount = 0;
  let failCount = 0;

  for (let i = 0; i < cachedShots.length; i++) {
    if (batchAbort?.signal?.aborted) break;
    setNodeMsg('prompts', `生成关键帧 ${i + 1}/${cachedShots.length}...`, true);
    try {
      await generateSingleKeyFrame(i);
      doneCount++;
    } catch (e) {
      failCount++;
    }
  }

  showStopBtn(false);
  if (batchAbort?.signal?.aborted) {
    setNodeMsg('prompts', `⏹ 已停止 (${doneCount}/${cachedShots.length})`);
    updateNodeState('prompts', 'idle');
  } else {
    setNodeMsg('prompts', `✅ ${doneCount} 个关键帧` + (failCount ? ` (${failCount}失败)` : ''));
    updateNodeState('prompts', doneCount > 0 ? 'done' : 'idle');
  }
  batchAbort = null;
}

/** 从场景名提取基础地点名（去掉时间/视角/方向等修饰词）用于关联同一地点的变体 */
function _sceneBaseName(name) {
  let s = name;
  // 去掉括号内容：（面向室内）、(门口方向) 等
  s = s.replace(/[（(][^）)]*[）)]\s*$/, '');
  // 去掉分隔符后的时间/视角修饰词
  s = s.replace(/[·\-_—\s]*(白天|夜晚|夜间|深夜|清晨|黄昏|傍晚|午后|早上|晚上|日间|夜里|凌晨|正午|上午|下午|日出|日落|室内|室外|内部|外部|门口|阳台|窗边|内景|外景|远景|近景|正面|背面|侧面|俯视|仰视)\s*$/g, '');
  return s.trim();
}

/** 手动断开的场景参考关系黑名单 "源→目标" */
const _sceneRefBlacklist = new Set();

/** 检查两个场景是否被黑名单阻止参考 */
function _isSceneRefBlocked(nameA, nameB) {
  return _sceneRefBlacklist.has(`${nameA}→${nameB}`) || _sceneRefBlacklist.has(`${nameB}→${nameA}`);
}

/** 断开场景参考关系 */
function breakSceneRef(name, refName) {
  _sceneRefBlacklist.add(`${name}→${refName}`);
  _refConnections.delete(`scenes/${name}`);
  renderImagesFromCache();
  toast(`已断开 ${name} → ${refName} 的参考关系`);
}

// ====== 参考图连线系统 ======
/** 存储手动/自动参考连线: key="cat/name"(需参考), value="cat/name"(提供参考) */
const _refConnections = new Map();
let _connectingFrom = null; // 正在连线的起点 key，null=未在连线

/** 自动填充场景参考连线（仅补充尚未手动设定的） */
function _autoPopulateConnections() {
  if (!cachedAnalysis?.scenes) return;
  for (const scene of cachedAnalysis.scenes) {
    const key = `scenes/${scene.name}`;
    // 跳过已有连线（手动设定的优先）
    if (_refConnections.has(key)) continue;
    const relName = _findRelatedSceneName(scene.name);
    if (relName) _refConnections.set(key, `scenes/${relName}`);
  }
}

/** 按住端口开始拖拽连线 */
function startDragConnect(cat, name, event) {
  if (event.button !== 0) return; // 仅左键
  event.preventDefault();
  event.stopPropagation();
  const key = `${cat}/${name}`;
  _connectingFrom = key;
  const port = document.querySelector(`[data-ref-id="${key}"] .ref-port`);
  if (port) port.classList.add('connecting');
  document.addEventListener('mousemove', _onConnectMouseMove);
  document.addEventListener('mouseup', _onDragConnectEnd);
}

/** 松开鼠标完成连线 */
function endDragConnect(cat, name, event) {
  if (!_connectingFrom) return;
  event.stopPropagation();
  const key = `${cat}/${name}`;
  if (_connectingFrom !== key) {
    _refConnections.set(key, _connectingFrom);
    toast(`已连接 ${_connectingFrom.split('/').slice(1).join('/')} → ${name}`);
  }
  _cancelConnect();
  drawRefLines();
}

/** 松开但不在端口上 → 取消 */
function _onDragConnectEnd(e) {
  // 如果松开在端口上，endDragConnect 已处理
  _cancelConnect();
}

/** 右键端口 —— 删除连线 */
function handlePortRightClick(cat, name) {
  const key = `${cat}/${name}`;
  // 删除以此卡片为目标的连线
  if (_refConnections.has(key)) {
    const fromKey = _refConnections.get(key);
    _refConnections.delete(key);
    // 场景连线加入黑名单
    if (cat === 'scenes') {
      const fromName = fromKey.split('/').slice(1).join('/');
      _sceneRefBlacklist.add(`${name}→${fromName}`);
    }
    drawRefLines();
    toast(`已断开 ${name} 的参考连线`);
    return;
  }
  // 删除以此卡片为来源的连线
  for (const [toKey, fromKey] of _refConnections) {
    if (fromKey === key) {
      _refConnections.delete(toKey);
      drawRefLines();
      toast(`已断开 ${toKey.split('/').slice(1).join('/')} 的参考连线`);
      return;
    }
  }
}

function _cancelConnect() {
  if (_connectingFrom) {
    const port = document.querySelector(`[data-ref-id="${_connectingFrom}"] .ref-port`);
    if (port) port.classList.remove('connecting');
    _connectingFrom = null;
  }
  document.removeEventListener('mousemove', _onConnectMouseMove);
  document.removeEventListener('mouseup', _onDragConnectEnd);
  document.getElementById('refTempLine')?.remove();
}

function _onConnectKeyDown(e) { if (e.key === 'Escape') _cancelConnect(); }

function _onConnectMouseMove(e) {
  const svg = document.getElementById('refLinesSvg');
  if (!svg || !_connectingFrom) return;
  const container = svg.parentElement;
  const containerRect = container.getBoundingClientRect();
  const fromPort = container.querySelector(`[data-ref-id="${_connectingFrom}"] .ref-port`);
  if (!fromPort) return;
  const fr = fromPort.getBoundingClientRect();
  const x1 = fr.left + fr.width / 2 - containerRect.left;
  const y1 = fr.top + fr.height / 2 - containerRect.top;
  const x2 = e.clientX - containerRect.left;
  const y2 = e.clientY - containerRect.top;
  let line = document.getElementById('refTempLine');
  if (!line) {
    line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.id = 'refTempLine';
    line.setAttribute('stroke', '#ffaa00');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '6,3');
    svg.appendChild(line);
  }
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
}

/** 绘制所有参考连线 */
function drawRefLines() {
  const svg = document.getElementById('refLinesSvg');
  if (!svg) return;
  svg.innerHTML = '';
  const container = svg.parentElement;
  const containerRect = container.getBoundingClientRect();
  // SVG 尺寸覆盖内容
  svg.setAttribute('width', container.scrollWidth || container.offsetWidth);
  svg.setAttribute('height', container.scrollHeight || container.offsetHeight);

  for (const [toKey, fromKey] of _refConnections) {
    const fromPort = container.querySelector(`[data-ref-id="${fromKey}"] .ref-port`);
    const toPort = container.querySelector(`[data-ref-id="${toKey}"] .ref-port`);
    if (!fromPort || !toPort) continue;
    const fr = fromPort.getBoundingClientRect();
    const tr = toPort.getBoundingClientRect();
    const x1 = fr.left + fr.width / 2 - containerRect.left;
    const y1 = fr.top + fr.height / 2 - containerRect.top;
    const x2 = tr.left + tr.width / 2 - containerRect.left;
    const y2 = tr.top + tr.height / 2 - containerRect.top;
    const dx = Math.max(Math.abs(x2 - x1) * 0.4, 40);
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${x1},${y1} C${x1 + dx},${y1} ${x2 - dx},${y2} ${x2},${y2}`);
    path.setAttribute('stroke', 'rgba(126,203,255,0.6)');
    path.setAttribute('stroke-width', '2');
    path.setAttribute('fill', 'none');
    path.style.cursor = 'pointer';
    // 右键删除连线
    const capturedTo = toKey;
    path.addEventListener('contextmenu', (ev) => {
      ev.preventDefault(); ev.stopPropagation();
      _refConnections.delete(capturedTo);
      drawRefLines();
      toast(`已断开 ${capturedTo.split('/').slice(1).join('/')} 的参考连线`);
    });
    // 箭头标记（小圆点）在目标端
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', x2); circle.setAttribute('cy', y2);
    circle.setAttribute('r', '4');
    circle.setAttribute('fill', 'rgba(126,203,255,0.8)');
    svg.appendChild(path);
    svg.appendChild(circle);
  }
  // 更新端口样式
  container.querySelectorAll('.ref-port').forEach(p => {
    const id = p.closest('[data-ref-id]')?.dataset.refId;
    if (id && (_refConnections.has(id) || [..._refConnections.values()].includes(id))) {
      p.classList.add('has-conn');
    } else {
      p.classList.remove('has-conn');
    }
  });
}

/** 获取卡片的手动连线参考图 URL（供生成时使用） */
function _getConnectionRefUrl(cat, name) {
  const key = `${cat}/${name}`;
  const fromKey = _refConnections.get(key);
  if (!fromKey) return null;
  const [fromCat, ...fromNameParts] = fromKey.split('/');
  const fromName = fromNameParts.join('/');
  return cachedRefImages?.[fromCat]?.[fromName] || null;
}

/** 查找与 name 相关的已有场景名（用于显示参考关系） */
function _findRelatedSceneName(name) {
  const base = _sceneBaseName(name);
  if (!base) return null;
  const allScenes = (cachedAnalysis?.scenes || []).map(s => s.name);
  // 1. 精确基础名
  for (const k of allScenes) {
    if (k === name || _isSceneRefBlocked(name, k)) continue;
    if (_sceneBaseName(k) === base) return k;
  }
  // 2. 包含关系
  for (const k of allScenes) {
    if (k === name || _isSceneRefBlocked(name, k)) continue;
    const kBase = _sceneBaseName(k);
    if (kBase.length >= 2 && base.length >= 2 && (base.includes(kBase) || kBase.includes(base))) return k;
  }
  // 3. LCS ≥ 2
  for (const k of allScenes) {
    if (k === name || _isSceneRefBlocked(name, k)) continue;
    if (_longestCommonSubstr(base, _sceneBaseName(k)) >= 2) return k;
  }
  return null;
}

/** 在 cachedRefImages.scenes 中查找与 name 相关的已有参考图 URL */
function _findRelatedSceneRefUrl(name) {
  const base = _sceneBaseName(name);
  if (!base || !cachedRefImages?.scenes) return null;
  // 1. 精确基础名匹配
  for (const [k, url] of Object.entries(cachedRefImages.scenes)) {
    if (k === name || !url || _isSceneRefBlocked(name, k)) continue;
    if (_sceneBaseName(k) === base) return url;
  }
  // 2. 包含关系匹配
  for (const [k, url] of Object.entries(cachedRefImages.scenes)) {
    if (k === name || !url || _isSceneRefBlocked(name, k)) continue;
    const kBase = _sceneBaseName(k);
    if (kBase.length >= 2 && base.length >= 2 && (base.includes(kBase) || kBase.includes(base))) return url;
  }
  // 3. 最长公共子串 ≥ 2字符则视为相关
  for (const [k, url] of Object.entries(cachedRefImages.scenes)) {
    if (k === name || !url || _isSceneRefBlocked(name, k)) continue;
    if (_longestCommonSubstr(base, _sceneBaseName(k)) >= 2) return url;
  }
  return null;
}

/** 计算两个字符串的最长公共子串长度 */
function _longestCommonSubstr(a, b) {
  if (!a || !b) return 0;
  let max = 0;
  for (let i = 0; i < a.length; i++) {
    for (let j = 0; j < b.length; j++) {
      let len = 0;
      while (i + len < a.length && j + len < b.length && a[i + len] === b[j + len]) len++;
      if (len > max) max = len;
    }
  }
  return max;
}

async function runStep5(type) {
  if (!requireProject() || !requireStyle()) return;
  await flushAllPendingSaves();
  _step5Abort = false;
  const label = type === 'all' ? '全部' : type === 'characters' ? '角色' : type === 'scenes' ? '场景' : type === 'props' ? '道具' : type;

  // 收集需要生成的 (category, name) 列表
  const cats = type === 'all' ? ['characters', 'scenes', 'props'] : [type];
  const tasks = [];
  for (const cat of cats) {
    const items = cachedAnalysis?.[cat] || [];
    for (const item of items) {
      // 跳过已有图片的
      if (cachedRefImages[cat]?.[item.name]) continue;
      tasks.push({ category: cat, name: item.name });
    }
  }
  if (tasks.length === 0) {
    toast('所有参考图都已存在，无需生成');
    return;
  }

  setNodeMsg('images', `生成${label}参考图中... (0/${tasks.length})`, true);
  updateNodeState('images', 'running');
  showStopImagesBtn(true);

  let done = 0, failed = 0;
  for (const t of tasks) {
    if (_step5Abort) break;
    const ip = getItemRefImageParams(t.category, t.name);
    if (ip.model === 'jimeng') {
      // 走即梦浏览器自动化
      try {
        // 场景类别：优先使用手动连线参考，否则自动匹配相关场景参考图
        const refUrl = _getConnectionRefUrl(t.category, t.name) || (t.category === 'scenes' ? _findRelatedSceneRefUrl(t.name) : undefined);
        if (refUrl) console.log(`[参考图] ${t.name} 参考已有场景图`);
        await genSingleImage(t.category, t.name, refUrl);
      } catch (e) {
        console.error(`${t.name} 生成失败:`, e.message);
        failed++;
      }
    } else {
      // 走 Gemini API
      try {
        const r = await apiCall('/api/workflow/generate-images', {
          projectPath: currentProject, type: t.category, imageParams: ip, names: [t.name], visualStyle
        });
        await loadRefImages();
      } catch (e) {
        console.error(`${t.name} 生成失败:`, e.message);
        failed++;
      }
    }
    done++;
    setNodeMsg('images', `生成${label}参考图中... (${done}/${tasks.length})`, true);
  }

  showStopImagesBtn(false);
  if (_step5Abort) {
    _step5Abort = false;
    return;
  }
  await loadRefImages();
  renderImagesFromCache();
  const msg = failed > 0 ? `✅ 参考图生成完成 (${done - failed}成功, ${failed}失败)` : '✅ 参考图生成完成';
  setNodeMsg('images', msg);
  updateNodeState('images', 'done');
}

function renderImagesOutput(results) {
  setNodeExtra('images', '<div style="color:var(--success);">✓ 参考图已生成</div>');
  renderImagesFromCache();
}

/** 从 cachedRefImages + cachedAnalysis 渲染图片卡片（含上传/生成按钮） */
function renderImagesFromCache() {
  const catLabel = { characters: '👤 角色', scenes: '🏠 场景', props: '🔧 道具' };
  // 从 analysis 获取所有名称
  const allNames = {
    characters: (cachedAnalysis?.characters || []).map(c => c.name),
    scenes: (cachedAnalysis?.scenes || []).map(s => s.name),
    props: (cachedAnalysis?.props || []).map(p => p.name),
  };

  let cols = '';
  for (const cat of ['characters', 'scenes', 'props']) {
    const imgs = cachedRefImages[cat] || {};
    const names = [...new Set([...allNames[cat], ...Object.keys(imgs)])];
    if (!names.length) continue;

    let cards = '';
    for (const name of names) {
      const url = imgs[name];
      const ip = getItemRefImageParams(cat, name);
      const eName = name.replace(/'/g, "\\'");
      const imgEl = url
        ? `<img src="${escHtml(toImgSrc(url))}" title="${name}">`
        : `<div class="img-placeholder" onclick="triggerUpload('${cat}','${eName}')"
             ondragover="event.preventDefault();this.classList.add('drag-over')"
             ondragleave="this.classList.remove('drag-over')"
             ondrop="handleDrop(event,'${cat}','${eName}')">
             拖入或<br>点击上传
           </div>`;
      const hasConn = _refConnections.has(`${cat}/${name}`) || [..._refConnections.values()].includes(`${cat}/${name}`);
      cards += `<div class="img-thumb" id="img-${cat}-${name}" data-ref-id="${cat}/${name}"
        ondragover="onAssetDragOver(event)"
        ondragleave="onAssetDragLeave(event)"
        ondrop="onAssetDrop(event,'${cat}','${eName}')">
        <div class="ref-port${hasConn?' has-conn':''}" onmousedown="startDragConnect('${cat}','${eName}',event)" onmouseup="endDragConnect('${cat}','${eName}',event)" oncontextmenu="event.preventDefault();handlePortRightClick('${cat}','${eName}')"></div>
        ${imgEl}
        <div class="img-name">${name}</div>
        <div class="item-params">
          <select onchange="setItemRefImageParam('${cat}','${eName}','model',this.value)">
            <option value="jimeng" ${ip.model==='jimeng'?'selected':''}>即梦</option>
            <option value="gemini" ${ip.model==='gemini'?'selected':''}>Gemini</option>
          </select>
        </div>
        <div class="img-actions">
          <button onclick="genSingleImage('${cat}','${eName}')">生成</button>
          <button onclick="triggerUpload('${cat}','${eName}')">上传</button>
          <button onclick="deleteRefImageItem('${cat}','${eName}')" style="background:#e74c3c;color:#fff;" title="删除">✕</button>
        </div>
      </div>`;
    }
    cols += `<div class="output-col" style="max-width:260px;">
      <div class="output-col-head">${catLabel[cat]}</div>
      <div class="img-grid">${cards}</div>
    </div>`;
  }
  setOutput('images', `<div class="ref-lines-container"><div class="output-columns">${cols}</div><svg id="refLinesSvg"></svg></div>`);
  // 自动填充场景参考连线
  _autoPopulateConnections();
  // 延迟绘制连线（等 DOM 更新）
  requestAnimationFrame(drawRefLines);
  // 同步更新资产库面板
  if (document.getElementById('assetPanel').classList.contains('open')) refreshAssetPanel();
}

/** 删除参考图及对应的分析项 */
async function deleteRefImageItem(category, name) {
  const catLabel = { characters: '角色', scenes: '场景', props: '道具' }[category] || category;
  // 1. 删除后端参考图数据
  try {
    await apiCall('/api/workflow/delete-ref-image', { projectPath: currentProject, category, name });
  } catch (e) { console.warn('删除参考图失败:', e.message); }
  // 2. 从前端缓存移除参考图
  if (cachedRefImages[category]) delete cachedRefImages[category][name];
  // 3. 同步删除步骤2的分析项
  if (cachedAnalysis?.[category]) {
    const idx = cachedAnalysis[category].findIndex(i => i.name === name);
    if (idx >= 0) {
      cachedAnalysis[category].splice(idx, 1);
      // 清理分镜中的引用
      for (const sp of (cachedShotPlans || [])) {
        if (category === 'scenes' && sp.scene === name) sp.scene = '';
        if (category === 'characters' && sp.characters) sp.characters = sp.characters.filter(c => c !== name);
        if (category === 'props' && sp.props) sp.props = sp.props.filter(p => p !== name);
      }
      for (const sh of (cachedShots || [])) {
        if (category === 'scenes' && sh.scene === name) sh.scene = '';
        if (category === 'characters' && sh.characters) sh.characters = sh.characters.filter(c => c !== name);
        if (category === 'props' && sh.props) sh.props = sh.props.filter(p => p !== name);
      }
      saveAnalysisDebounced();
      if (cachedShotPlans.length) saveShotPlansDebounced();
    }
  }
  // 4. 刷新所有相关视图
  renderAnalysisOutput(cachedAnalysis);
  renderImagesFromCache();
  if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
  toast(`已删除${catLabel}：${name}`);
}

/** 触发文件选择上传 */
function triggerUpload(category, name) {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = async () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      await uploadRefImage(category, name, reader.result);
    };
    reader.readAsDataURL(file);
  };
  input.click();
}

/** 拖拽上传 */
function handleDrop(e, category, name) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return toast('请拖入图片文件', true);
  const reader = new FileReader();
  reader.onload = async () => {
    await uploadRefImage(category, name, reader.result);
  };
  reader.readAsDataURL(file);
}

/** 上传参考图到后端 */
async function uploadRefImage(category, name, imageData) {
  if (!requireProject()) return;
  try {
    const r = await apiCall('/api/workflow/upload-ref-image', { projectPath: currentProject, category, name, imageData });
    if (r.ok) {
      await loadRefImages();
      renderImagesFromCache();
      toast(`${name} 图片已上传`);
    }
  } catch (e) { toast('上传失败: ' + e.message, true); }
}

/** 单独生成某个参考图 */
const _imgAborts = {}; // category-name → { ac: AbortController, taskId }
function cancelImageGen(category, name) {
  const key = `${category}-${name}`;
  const entry = _imgAborts[key];
  if (entry) {
    entry.ac.abort();
    if (entry.taskId) apiCall('/api/workflow/cancel-task', { taskId: entry.taskId }).catch(() => {});
    delete _imgAborts[key];
  }
}
async function genSingleImage(category, name, referenceImageUrl) {
  if (!requireProject()) return;
  // 如果未指定参考图，自动从连线关系或自动匹配中查找
  if (!referenceImageUrl) {
    referenceImageUrl = _getConnectionRefUrl(category, name) || (category === 'scenes' ? _findRelatedSceneRefUrl(name) : undefined);
    if (referenceImageUrl) console.log(`[参考图] ${name} 自动使用连线/匹配参考图`);
  }
  const el = document.getElementById(`img-${category}-${name}`);
  if (el) el.querySelector('.img-actions').innerHTML = '<span class="loading-spin"></span>';
  const ip = getItemRefImageParams(category, name);
  const eName = name.replace(/'/g, "\\'");
  const abortKey = `${category}-${name}`;
  const ac = new AbortController();
  _imgAborts[abortKey] = { ac, taskId: null };
  const cancelBtn = `<button onclick="cancelImageGen('${category}','${eName}')" style="background:#e74c3c;color:#fff;margin-left:4px;">取消</button>`;
  try {
    if (ip.model === 'jimeng') {
      // 即梦模式：浏览器自动化生成，返回多张候选图
      const items = cachedAnalysis?.[category] || [];
      const item = items.find(i => i.name === name);
      const desc = item?.description || name;
      const stylePrefix = visualStyle ? `${visualStyle} style, ` : '';
      const noPersonSuffix = category === 'scenes' ? ', no people, no human figures, empty scene' : '';
      const prompt = `${stylePrefix}${desc}, high quality, detailed${noPersonSuffix}`;
      if (el) el.querySelector('.img-actions').innerHTML = `<span class="loading-spin"></span> 即梦生成中...${cancelBtn}`;
      const body = { projectPath: currentProject, category, name, prompt, aspectRatio: ip.aspectRatio };
      if (referenceImageUrl) body.referenceImageUrl = referenceImageUrl;
      if (ip.quality) body.quality = ip.quality;
      const r = await apiCall('/api/workflow/generate-image-jimeng', body);
      if (_imgAborts[abortKey]) _imgAborts[abortKey].taskId = r.taskId;
      // 轮询等待完成（图片生成超时15分钟）
      const result = await pollTask(r.taskId, (data) => {
        if (el && data.message) el.querySelector('.img-actions').innerHTML = `<span class="loading-spin"></span> ${escHtml(data.message)}${cancelBtn}`;
      }, 900000, 8000, ac.signal);
      const imageUrls = result.imageUrls || (result.imageUrl ? [result.imageUrl] : []);
      if (imageUrls.length === 0) throw new Error('未生成任何图片');
      if (imageUrls.length === 1) {
        // 只有一张，直接使用
        await apiCall('/api/workflow/set-ref-image', { projectPath: currentProject, category, name, imageUrl: imageUrls[0] });
      } else {
        // 多张候选，弹出选择界面
        const chosen = await showImageCandidates(imageUrls, name);
        await apiCall('/api/workflow/set-ref-image', { projectPath: currentProject, category, name, imageUrl: chosen });
      }
      await loadRefImages();
      renderImagesFromCache();
      toast(`${name} 图片已生成`);
    } else {
      // Gemini/API 模式：原有逻辑
      if (el) el.querySelector('.img-actions').innerHTML = `<span class="loading-spin"></span> 生成中...${cancelBtn}`;
      await apiCall('/api/workflow/generate-images', { projectPath: currentProject, type: category, names: [name], imageParams: ip, visualStyle });
      await loadRefImages();
      renderImagesFromCache();
      toast(`${name} 图片已生成`);
    }
  } catch (e) {
    if (e.message === '已取消') toast(`${name} 已取消`);
    else toast('生成失败: ' + e.message, true);
    if (el) el.querySelector('.img-actions').innerHTML = '<button onclick="genSingleImage(\''+category+'\',\''+eName+'\')">生成</button><button onclick="triggerUpload(\''+category+'\',\''+eName+'\')">上传</button>';
  } finally {
    delete _imgAborts[abortKey];
  }
}

/** 候选图选择弹窗队列，防止多个弹窗冲突 */
let _candidateQueue = Promise.resolve();

/** 显示即梦多图候选选择弹窗，返回用户选中的图片URL（队列化，依次弹出） */
function showImageCandidates(imageUrls, itemName) {
  const task = _candidateQueue.then(() => _showCandidatePopup(imageUrls, itemName));
  _candidateQueue = task.catch(() => {});
  return task;
}

/** 大图查看器 */
function showLargeImage(src, title) {
  const overlay = document.createElement('div');
  overlay.className = 'img-viewer-overlay';
  overlay.innerHTML = `
    <div class="img-viewer-box">
      <img src="${escHtml(src)}">
      ${title ? `<div class="img-viewer-title">${escHtml(title)}</div>` : ''}
      <button class="img-viewer-close">✕</button>
    </div>
  `;
  const close = () => { document.removeEventListener('keydown', onKey); overlay.remove(); };
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  overlay.querySelector('.img-viewer-close').onclick = close;
  const onKey = (e) => { if (e.key === 'Escape') close(); };
  document.addEventListener('keydown', onKey);
  document.body.appendChild(overlay);
}

// 全局图片点击查看大图（事件委托）
document.addEventListener('click', (e) => {
  const img = e.target.closest('img');
  if (!img) return;
  const src = img.src || img.getAttribute('src');
  if (!src || src.startsWith('data:')) return;
  // 跳过候选图弹窗内的图片（有自己的选择行为）
  if (img.closest('.img-candidates-overlay') || img.closest('.img-viewer-overlay')) return;
  // 跳过太小的图标
  if (img.offsetWidth < 40 && img.offsetHeight < 40) return;
  e.preventDefault();
  e.stopPropagation();
  showLargeImage(src, img.title || img.alt || '');
}, true);

function _showCandidatePopup(imageUrls, itemName) {
  return new Promise((resolve) => {
    let selectedIdx = 0;
    let resolved = false;
    const finish = (url) => { if (resolved) return; resolved = true; overlay.remove(); resolve(url); };

    const overlay = document.createElement('div');
    overlay.className = 'img-candidates-overlay';
    const safeUrls = imageUrls.map(u => escHtml(toImgSrc(u)));
    overlay.innerHTML = `
      <div class="img-candidates-box">
        <div class="img-candidates-title">🖼 ${escHtml(itemName)} — 选择一张参考图 (${imageUrls.length}张候选)</div>
        <div class="img-candidates-grid">
          ${safeUrls.map((url, i) => `
            <div class="img-candidate ${i === 0 ? 'selected' : ''}" data-idx="${i}">
              <img src="${url}">
              <div class="candidate-badge">✓</div>
            </div>
          `).join('')}
        </div>
        <div class="img-candidates-actions">
          <button class="btn-confirm">确认选择</button>
          <button class="btn-cancel">使用默认(第1张)</button>
        </div>
      </div>
    `;

    const cards = overlay.querySelectorAll('.img-candidate');
    cards.forEach(card => {
      card.onclick = () => {
        cards.forEach(c => c.classList.remove('selected'));
        card.classList.add('selected');
        selectedIdx = parseInt(card.dataset.idx);
      };
    });

    overlay.querySelector('.btn-confirm').onclick = () => finish(imageUrls[selectedIdx]);
    overlay.querySelector('.btn-cancel').onclick = () => finish(imageUrls[0]);
    overlay.onclick = (e) => { if (e.target === overlay) finish(imageUrls[0]); };
    const onKey = (e) => { if (e.key === 'Escape') { document.removeEventListener('keydown', onKey); finish(imageUrls[0]); } };
    document.addEventListener('keydown', onKey);

    document.body.appendChild(overlay);
  });
}

// ============================
// 步骤6：多轨道时间轴播放器
// ============================

let _tlState = {
  slots: [],          // [{shotIdx, shotNumber, duration, videos: [{url, actualDur}]}] — 每个分镜一个slot
  trackCount: 0,      // 最大轨道数
  trackVisible: {},   // {trackIdx: bool} 轨道可见性
  totalDuration: 0,
  playing: false,
  currentSlotIdx: 0,  // 当前播放的 slot
  currentTime: 0,     // 全局播放时间（秒）
  rafId: null,
};

/** 从 cachedShots 构建时间轴 slot 数据 */
function renderTimeline() {
  if (_tlState.rafId) { cancelAnimationFrame(_tlState.rafId); _tlState.rafId = null; }
  _tlState.playing = false;

  const slots = [];
  let maxTracks = 1;
  if (cachedShots && cachedShots.length) {
    cachedShots.forEach((shot, i) => {
      const dur = getItemVideoParams(i).duration || 5;
      const videos = [];
      if (shot.videoUrls && shot.videoUrls.length > 0) {
        shot.videoUrls.forEach(u => videos.push({ url: u, actualDur: null }));
      } else if (shot.videoUrl) {
        videos.push({ url: shot.videoUrl, actualDur: null });
      }
      slots.push({ shotIdx: i, shotNumber: shot.shotNumber || (i + 1), duration: dur, videos });
      if (videos.length > maxTracks) maxTracks = videos.length;
    });
  }
  _tlState.slots = slots;
  _tlState.trackCount = maxTracks;
  _tlState.currentSlotIdx = 0;
  _tlState.currentTime = 0;
  _tlState.totalDuration = slots.reduce((s, sl) => s + sl.duration, 0);

  // 初始化轨道可见性（默认轨道1可见）
  for (let t = 0; t < maxTracks; t++) {
    if (_tlState.trackVisible[t] === undefined) _tlState.trackVisible[t] = (t === 0);
  }

  // 获取真实视频时长
  let pending = 0;
  const allVideos = [];
  slots.forEach(sl => sl.videos.forEach(v => { if (v.url) allVideos.push(v); }));
  if (allVideos.length === 0) {
    _tlBuildUI();
    showOutput('timeline');
    return;
  }
  pending = allVideos.length;
  allVideos.forEach(v => {
    const el = document.createElement('video');
    el.preload = 'metadata';
    el.src = toImgSrc(v.url);
    el.onloadedmetadata = () => { v.actualDur = el.duration; if (--pending === 0) _tlBuildUI(); };
    el.onerror = () => { v.actualDur = null; if (--pending === 0) _tlBuildUI(); };
  });
  showOutput('timeline');
}

function _tlFmtTime(sec) {
  if (!sec || sec < 0) sec = 0;
  const m = Math.floor(sec / 60);
  const s = sec - m * 60;
  return `${String(m).padStart(2, '0')}:${s.toFixed(1).padStart(4, '0')}`;
}

/** 获取当前用于播放的视频URL（最高可见轨道优先） */
/** 获取当前播放轨道的视频URL */
function _tlGetPlayUrl(slot) {
  for (let t = 0; t < _tlState.trackCount; t++) {
    if (_tlState.trackVisible[t] && slot.videos[t]) return slot.videos[t].url;
  }
  return null;
}

function _tlBuildUI() {
  const { slots, trackCount, totalDuration } = _tlState;
  const hasAnyVideo = slots.some(sl => sl.videos.length > 0);

  let html = '<div class="tl-container">';

  // — 预览播放器
  html += '<div class="tl-preview" id="tl-preview">';
  const firstUrl = hasAnyVideo ? _tlGetPlayUrl(slots.find(sl => sl.videos.length > 0) || slots[0]) : null;
  if (firstUrl) {
    html += `<video id="tl-video" src="${escHtml(toImgSrc(firstUrl))}" preload="auto"></video>`;
  } else {
    html += '<div class="tl-preview-empty">暂无已生成的视频</div>';
  }
  html += '</div>';

  // — 控制栏
  html += '<div class="tl-controls">';
  html += '<button class="tl-btn" onclick="_tlPrev()" title="上一段">⏮</button>';
  html += '<button class="tl-btn" id="tl-play" onclick="_tlTogglePlay()" title="播放/暂停">▶</button>';
  html += '<button class="tl-btn" onclick="_tlNext()" title="下一段">⏭</button>';
  html += '<button class="tl-btn" onclick="_tlStop()" title="停止">⏹</button>';
  html += `<span class="tl-time" id="tl-time-display">00:00.0 / ${_tlFmtTime(totalDuration)}</span>`;
  html += '</div>';

  // — 轨道管理按钮
  html += '<div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">';
  html += '<button class="tl-btn" style="width:auto;padding:0 8px;font-size:10px;height:24px;" onclick="_tlAddTrack()" title="添加轨道">➕ 添加轨道</button>';
  if (trackCount > 1) {
    html += '<button class="tl-btn" style="width:auto;padding:0 8px;font-size:10px;height:24px;" onclick="_tlRemoveTrack()" title="删除最后一条空轨道">➖ 删除轨道</button>';
  }
  html += '</div>';

  // — 刻度尺 + 分镜区域标注
  html += '<div class="tl-ruler" id="tl-ruler" onmousedown="_tlRulerSeek(event)">';
  // 刻度
  const tickInterval = totalDuration <= 30 ? 1 : totalDuration <= 120 ? 5 : 10;
  for (let t = 0; t <= totalDuration; t += tickInterval) {
    const pct = totalDuration > 0 ? (t / totalDuration * 100) : 0;
    html += `<div class="tl-ruler-tick" style="left:${pct}%"></div>`;
    html += `<div class="tl-ruler-label" style="left:${pct}%">${_tlFmtTime(t)}</div>`;
  }
  // 分镜区域标注
  let offsetSec = 0;
  slots.forEach((sl, si) => {
    const leftPct = totalDuration > 0 ? (offsetSec / totalDuration * 100) : 0;
    const widthPct = totalDuration > 0 ? (sl.duration / totalDuration * 100) : 0;
    html += `<div style="position:absolute;bottom:0;left:${leftPct}%;width:${widthPct}%;height:8px;background:hsla(${(si*40+220)%360},40%,30%,0.5);border-left:1px solid var(--border);" title="分镜${sl.shotNumber} (${sl.duration}s)"></div>`;
    html += `<div style="position:absolute;bottom:0;left:${leftPct}%;font-size:7px;color:var(--text3);transform:translateX(2px);">S${sl.shotNumber}</div>`;
    offsetSec += sl.duration;
  });
  html += '<div class="tl-playhead" id="tl-playhead" style="left:0%" onmousedown="_tlRulerSeek(event)"></div>';
  html += '</div>';

  // — 多轨道
  for (let t = 0; t < trackCount; t++) {
    const vis = _tlState.trackVisible[t];
    const opacity = vis ? '1' : '0.3';
    html += `<div class="tl-track" id="tl-track-${t}" style="opacity:${opacity};${t > 0 ? 'margin-top:2px;border-top:1px dashed var(--border);' : ''}">`;  
    html += `<div class="tl-track-toggle${vis ? '' : ' hidden'}" onclick="_tlToggleTrack(${t})" title="${vis ? '隐藏' : '显示'}轨道V${t+1}">${vis ? '👁' : '🚫'}</div>`;
    html += `<div class="tl-track-label">V${t + 1}</div>`;
    let off = 0;
    slots.forEach((sl, si) => {
      const leftPct = totalDuration > 0 ? (off / totalDuration * 100) : 0;
      const widthPct = totalDuration > 0 ? (sl.duration / totalDuration * 100) : 0;
      const video = sl.videos[t];
      const hue = (si * 40 + 220) % 360;
      if (video) {
        const effDur = video.actualDur || sl.duration;
        html += `<div class="tl-clip" id="tl-clip-${t}-${si}" data-track="${t}" data-slot="${si}" style="left:${leftPct}%;width:${widthPct}%;" draggable="true" onclick="_tlClipClick(${si})" oncontextmenu="event.preventDefault();_tlCtxClip(event,${si},${t})" ondragstart="_tlClipDragStart(event,${si},${t})" ondragover="event.preventDefault()" ondrop="_tlClipDrop(event,${si},${t})" ondragend="_tlClipDragEnd(event)">`;
        html += `<div class="tl-clip-bg" style="background:linear-gradient(135deg,hsl(${hue},40%,25%),hsl(${hue},30%,18%));"></div>`;
        html += `<span class="tl-clip-label">分镜${sl.shotNumber}</span>`;
        html += `<span class="tl-clip-dur">${effDur.toFixed(1)}s</span>`;
        html += '</div>';
      } else {
        // 空槽位 — 接受拖放
        html += `<div style="position:absolute;left:${leftPct}%;width:${widthPct}%;top:4px;height:40px;border:1px dashed var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;" oncontextmenu="event.preventDefault();_tlCtxEmpty(event,${si},${t})" ondragover="event.preventDefault();this.style.borderColor='var(--accent)'" ondragleave="this.style.borderColor='var(--border)'" ondrop="_tlClipDrop(event,${si},${t});this.style.borderColor='var(--border)'">`;
        html += `<span style="font-size:8px;color:var(--text3);">S${sl.shotNumber}</span>`;
        html += '</div>';
      }
      off += sl.duration;
    });
    html += '</div>';
  }

  // — 总时长
  const videoCount = slots.reduce((n, sl) => n + sl.videos.length, 0);
  html += `<div class="tl-total">共 ${slots.length} 个分镜 · ${videoCount} 段视频 · 总时长 ${_tlFmtTime(totalDuration)}</div>`;
  html += '</div>';

  setOutput('timeline', html);
}

/** 切换轨道可见性 */
function _tlToggleTrack(t) {
  _tlState.trackVisible[t] = !_tlState.trackVisible[t];
  // 确保至少一个轨道可见
  const anyVisible = Object.values(_tlState.trackVisible).some(v => v);
  if (!anyVisible) _tlState.trackVisible[t] = true;
  _tlBuildUI();
}

/** 播放/暂停 */
function _tlTogglePlay() {
  if (_tlState.slots.length === 0) return;
  _tlState.playing ? _tlPause() : _tlPlay();
}

function _tlPlay() {
  const vid = document.getElementById('tl-video');
  if (!vid) return;
  // 确保当前 slot 有可播放视频
  const slot = _tlState.slots[_tlState.currentSlotIdx];
  const url = slot ? _tlGetPlayUrl(slot) : null;
  if (!url) { _tlNext(); return; }
  _tlState.playing = true;
  const btn = document.getElementById('tl-play');
  if (btn) btn.textContent = '⏸';
  vid.play();
  _tlTick();
}

function _tlPause() {
  _tlState.playing = false;
  const btn = document.getElementById('tl-play');
  if (btn) btn.textContent = '▶';
  const vid = document.getElementById('tl-video');
  if (vid) vid.pause();
  if (_tlState.rafId) { cancelAnimationFrame(_tlState.rafId); _tlState.rafId = null; }
}

function _tlStop() {
  _tlPause();
  _tlState.currentSlotIdx = 0;
  _tlState.currentTime = 0;
  const slot = _tlState.slots[0];
  if (slot) _tlLoadSlot(0, 0);
  _tlUpdateUI();
}

/** 动画帧 */
function _tlTick() {
  if (!_tlState.playing) return;
  const vid = document.getElementById('tl-video');
  if (!vid) return;
  const slots = _tlState.slots;
  const ci = _tlState.currentSlotIdx;
  if (ci >= slots.length) { _tlStop(); return; }

  let offsetBefore = 0;
  for (let i = 0; i < ci; i++) offsetBefore += slots[i].duration;
  _tlState.currentTime = offsetBefore + Math.min(vid.currentTime, slots[ci].duration);

  // 视频播到 slot 时长 或 视频结束 → 切到下一个有可见视频的 slot
  if (vid.ended || vid.currentTime >= slots[ci].duration) {
    let next = ci + 1;
    while (next < slots.length && !_tlGetPlayUrl(slots[next])) next++;
    if (next < slots.length) {
      _tlState.currentSlotIdx = next;
      // 更新时间到跳过的 slot 之后
      let t = 0;
      for (let i = 0; i < next; i++) t += slots[i].duration;
      _tlState.currentTime = t;
      _tlLoadSlot(next, 0);
      const v2 = document.getElementById('tl-video');
      if (v2) v2.play();
    } else {
      _tlStop();
      return;
    }
  }

  _tlUpdateUI();
  _tlState.rafId = requestAnimationFrame(_tlTick);
}

function _tlUpdateUI() {
  const total = _tlState.totalDuration || 1;
  const pct = Math.min(100, _tlState.currentTime / total * 100);
  const ph = document.getElementById('tl-playhead');
  if (ph) ph.style.left = pct + '%';
  const td = document.getElementById('tl-time-display');
  if (td) td.textContent = `${_tlFmtTime(_tlState.currentTime)} / ${_tlFmtTime(total)}`;

  // 高亮当前 slot 的 clip
  const { slots, trackCount } = _tlState;
  for (let t = 0; t < trackCount; t++) {
    slots.forEach((_, si) => {
      const el = document.getElementById(`tl-clip-${t}-${si}`);
      if (el) el.classList.toggle('playing', si === _tlState.currentSlotIdx && _tlState.trackVisible[t]);
    });
  }
}

/** 加载 slot 到 video 元素 */
function _tlLoadSlot(si, seekTime) {
  const slots = _tlState.slots;
  if (si < 0 || si >= slots.length) return;
  const vid = document.getElementById('tl-video');
  if (!vid) return;
  const url = _tlGetPlayUrl(slots[si]);
  if (!url) return;
  const src = toImgSrc(url);
  if (vid.getAttribute('src') !== src) {
    vid.src = src;
    vid.load();
  }
  vid.currentTime = seekTime || 0;
}

function _tlPrev() {
  if (_tlState.slots.length === 0) return;
  const was = _tlState.playing;
  if (was) _tlPause();
  _tlState.currentSlotIdx = Math.max(0, _tlState.currentSlotIdx - 1);
  _tlLoadSlot(_tlState.currentSlotIdx, 0);
  let t = 0;
  for (let i = 0; i < _tlState.currentSlotIdx; i++) t += _tlState.slots[i].duration;
  _tlState.currentTime = t;
  _tlUpdateUI();
  if (was) _tlPlay();
}

function _tlNext() {
  if (_tlState.slots.length === 0) return;
  const was = _tlState.playing;
  if (was) _tlPause();
  // 跳到下一个有可见视频的slot
  let next = _tlState.currentSlotIdx + 1;
  while (next < _tlState.slots.length && !_tlGetPlayUrl(_tlState.slots[next])) next++;
  if (next >= _tlState.slots.length) next = _tlState.slots.length - 1;
  _tlState.currentSlotIdx = next;
  _tlLoadSlot(next, 0);
  let t = 0;
  for (let i = 0; i < next; i++) t += _tlState.slots[i].duration;
  _tlState.currentTime = t;
  _tlUpdateUI();
  if (was) _tlPlay();
}

function _tlRulerSeek(e) {
  const ruler = document.getElementById('tl-ruler');
  if (!ruler || _tlState.slots.length === 0) return;
  const _doSeek = (ev) => {
    const rect = ruler.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width));
    _tlSeekGlobal(pct * _tlState.totalDuration);
  };
  _doSeek(e);
  const _onMove = (ev) => { ev.preventDefault(); _doSeek(ev); };
  const _onUp = () => { document.removeEventListener('mousemove', _onMove); document.removeEventListener('mouseup', _onUp); document.body.style.cursor = ''; };
  document.addEventListener('mousemove', _onMove);
  document.addEventListener('mouseup', _onUp);
  document.body.style.cursor = 'grabbing';
}

function _tlClipClick(si) {
  const was = _tlState.playing;
  if (was) _tlPause();
  _tlState.currentSlotIdx = si;
  _tlLoadSlot(si, 0);
  let t = 0;
  for (let i = 0; i < si; i++) t += _tlState.slots[i].duration;
  _tlState.currentTime = t;
  _tlUpdateUI();
  if (was) _tlPlay();
}

function _tlSeekGlobal(sec) {
  const slots = _tlState.slots;
  let acc = 0;
  for (let i = 0; i < slots.length; i++) {
    if (acc + slots[i].duration > sec) {
      const was = _tlState.playing;
      if (was) _tlPause();
      _tlState.currentSlotIdx = i;
      _tlState.currentTime = sec;
      _tlLoadSlot(i, sec - acc);
      _tlUpdateUI();
      if (was) _tlPlay();
      return;
    }
    acc += slots[i].duration;
  }
  _tlStop();
}

/** 关闭任何已打开的右键菜单 */
function _tlCtxClose() {
  document.querySelectorAll('.tl-ctx').forEach(el => el.remove());
}
document.addEventListener('click', _tlCtxClose);

/** 显示右键菜单 */
function _tlCtxShow(e, items) {
  _tlCtxClose();
  const menu = document.createElement('div');
  menu.className = 'tl-ctx';
  menu.style.left = e.clientX + 'px';
  menu.style.top = e.clientY + 'px';
  items.forEach(item => {
    if (item === '---') {
      menu.innerHTML += '<div class="tl-ctx-sep"></div>';
    } else {
      const div = document.createElement('div');
      div.className = 'tl-ctx-item';
      div.innerHTML = `<span>${item.icon || ''}</span> ${escHtml(item.label)}`;
      div.onclick = () => { _tlCtxClose(); item.action(); };
      menu.appendChild(div);
    }
  });
  document.body.appendChild(menu);
  // 防止菜单超出窗口
  requestAnimationFrame(() => {
    const rect = menu.getBoundingClientRect();
    if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 4) + 'px';
    if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 4) + 'px';
  });
}

/** 视频片段右键菜单 */
function _tlCtxClip(e, slotIdx, trackIdx) {
  const slot = _tlState.slots[slotIdx];
  if (!slot) return;
  const video = slot.videos[trackIdx];
  if (!video) return;

  const items = [
    {
      icon: '📂', label: '打开视频文件位置',
      action: () => {
        const url = video.url;
        if (/^[A-Z]:\\/i.test(url)) {
          window.api.showInFolder(url);
        } else if (url.startsWith('/api/local-file?path=')) {
          window.api.showInFolder(decodeURIComponent(url.replace('/api/local-file?path=', '')));
        } else {
          toast('远程URL无法打开文件夹');
        }
      }
    },
    '---',
    {
      icon: '🗑', label: '从轨道移除此视频',
      action: () => {
        slot.videos.splice(trackIdx, 1);
        _tlState.trackCount = Math.max(1, _tlState.slots.reduce((m, s) => Math.max(m, s.videos.length), 0));
        _tlBuildUI();
        toast(`已从轨道移除分镜${slot.shotNumber}的视频`);
      }
    },
  ];
  _tlCtxShow(e, items);
}

/** 空槽位右键菜单 */
function _tlCtxEmpty(e, slotIdx, trackIdx) {
  const slot = _tlState.slots[slotIdx];
  if (!slot) return;
  const items = [
    {
      icon: '📁', label: '添加本地视频到此位置',
      action: async () => {
        const videosDir = currentProject ? currentProject + '\\05_generation\\videos' : '';
        const filePath = await window.api.selectVideo(videosDir);
        if (!filePath) return;
        while (slot.videos.length <= trackIdx) slot.videos.push(null);
        slot.videos[trackIdx] = { url: filePath, actualDur: null };
        // 同步到 cachedShots 持久化
        const si = slot.shotIdx;
        if (cachedShots[si]) {
          if (!cachedShots[si].videoUrls) cachedShots[si].videoUrls = cachedShots[si].videoUrl ? [cachedShots[si].videoUrl] : [];
          while (cachedShots[si].videoUrls.length <= trackIdx) cachedShots[si].videoUrls.push(null);
          cachedShots[si].videoUrls[trackIdx] = filePath;
          if (trackIdx === 0) cachedShots[si].videoUrl = filePath;
          apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
        }
        const v = document.createElement('video');
        v.preload = 'metadata';
        v.src = toImgSrc(filePath);
        v.onloadedmetadata = () => { slot.videos[trackIdx].actualDur = v.duration; _tlBuildUI(); };
        v.onerror = () => _tlBuildUI();
        _tlState.trackCount = Math.max(1, _tlState.slots.reduce((m, s) => Math.max(m, s.videos.length), 0));
        _tlBuildUI();
        toast(`已添加视频到分镜${slot.shotNumber}`);
      }
    },
  ];
  _tlCtxShow(e, items);
}

/** 拖拽视频片段 — 在轨道间移动 */
let _tlDragData = null;
function _tlClipDragStart(e, slotIdx, trackIdx) {
  e.stopPropagation();
  _tlDragData = { slotIdx, trackIdx };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', `tl-clip-${slotIdx}-${trackIdx}`);
  const el = e.target.closest('.tl-clip');
  if (el) el.classList.add('dragging');
}
function _tlClipDrop(e, toSlotIdx, toTrackIdx) {
  e.preventDefault();
  e.stopPropagation();
  if (!_tlDragData) return;
  const { slotIdx: fromSlot, trackIdx: fromTrack } = _tlDragData;
  if (fromSlot === toSlotIdx && fromTrack === toTrackIdx) return;
  const srcSlot = _tlState.slots[fromSlot];
  const dstSlot = _tlState.slots[toSlotIdx];
  if (!srcSlot || !dstSlot) return;
  const srcVideo = srcSlot.videos[fromTrack];
  const dstVideo = dstSlot.videos[toTrackIdx];
  while (dstSlot.videos.length <= toTrackIdx) dstSlot.videos.push(null);
  dstSlot.videos[toTrackIdx] = srcVideo;
  srcSlot.videos[fromTrack] = dstVideo || null;
  while (srcSlot.videos.length > 0 && !srcSlot.videos[srcSlot.videos.length - 1]) srcSlot.videos.pop();
  _tlDragData = null;
  _tlBuildUI();
}
function _tlClipDragEnd(e) {
  _tlDragData = null;
  document.querySelectorAll('.tl-clip.dragging').forEach(el => el.classList.remove('dragging'));
}

/** 添加新轨道 */
function _tlAddTrack() {
  _tlState.trackCount++;
  _tlState.trackVisible[_tlState.trackCount - 1] = true;
  _tlBuildUI();
}

/** 删除最后一条轨道（仅当为空时） */
function _tlRemoveTrack() {
  if (_tlState.trackCount <= 1) return;
  const lastT = _tlState.trackCount - 1;
  const hasVideo = _tlState.slots.some(sl => sl.videos[lastT]);
  if (hasVideo) { toast('最后一条轨道上有视频，无法删除'); return; }
  _tlState.slots.forEach(sl => { if (sl.videos.length > lastT) sl.videos.length = lastT; });
  delete _tlState.trackVisible[lastT];
  _tlState.trackCount--;
  _tlBuildUI();
}
