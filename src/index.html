<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>视频创作工作流</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f1a; --bg2: #161625; --bg3: #1e1e32;
      --accent: #6c5ce7; --accent-hover: #7d6ff0; --accent-glow: #6c5ce730;
      --accent2: #00cec9; --accent2-glow: #00cec920;
      --text: #e8e8f0; --text2: #8888a8; --text3: #5a5a78;
      --border: #2a2a42; --border-light: #35355a;
      --success: #00b894; --success-glow: #00b89430;
      --warning: #fdcb6e; --warning-glow: #fdcb6e30;
      --error: #ff6b6b;
      --node-bg: linear-gradient(145deg, #1a1a30, #161628);
      --node-bg-solid: #1a1a30;
      --node-border: #2a2a48;
      --node-border-hover: #4040668a;
      --conn: #4a4a7a; --radius: 12px;
      --glass: rgba(255,255,255,0.03);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
      --shadow-glow: 0 0 20px var(--accent-glow);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: -apple-system, 'SF Pro Display', 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: auto; -moz-osx-font-smoothing: auto;
      text-rendering: optimizeLegibility;
    }

    /* ======== 顶栏 ======== */
    .topbar {
      height: 48px; background: linear-gradient(180deg, #1a1a2e, #161625);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      z-index: 100; position: relative;
      box-shadow: 0 1px 12px rgba(0,0,0,0.4);
    }
    .topbar-title {
      font-size: 14px; font-weight: 700; letter-spacing: 0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-right: 16px;
    }
    .tb-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg3); color: var(--text2); font-size: 12px; cursor: pointer;
      transition: all .2s ease; backdrop-filter: blur(4px); letter-spacing: 0.3px;
    }
    .tb-btn:hover { border-color: var(--accent); color: var(--text); background: #252540; box-shadow: var(--shadow-glow); }
    .tb-sep { width: 1px; height: 20px; background: linear-gradient(180deg, transparent, var(--border), transparent); }
    .tb-label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .zoom-ctrl { display: flex; align-items: center; gap: 4px; margin-left: auto; }
    .zoom-ctrl button {
      width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg3); color: var(--text2); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .zoom-ctrl button:hover { border-color: var(--accent); color: var(--text); box-shadow: var(--shadow-glow); }
    .zoom-pct { font-size: 11px; color: var(--text3); width: 40px; text-align: center; font-weight: 600; }

    /* ======== 画布视口 ======== */
    .viewport {
      position: absolute; top: 48px; left: 0; right: 0; bottom: 0;
      overflow: hidden; cursor: grab;
      background:
        radial-gradient(circle at 50% 50%, #1a1a3010 0%, transparent 70%),
        radial-gradient(circle at 1px 1px, #2a2a4218 1px, transparent 0);
      background-size: 100% 100%, 20px 20px;
    }
    .viewport.grabbing { cursor: grabbing; }
    .canvas { position: absolute; top: 0; left: 0; }

    /* ======== SVG 连线层 ======== */
    .connections { position: absolute; top: 0; left: 0; width: 10000px; height: 10000px; pointer-events: none; }
    .conn-line {
      fill: none; stroke: var(--conn); stroke-width: 2; stroke-dasharray: 8 4;
      opacity: .5; transition: opacity .3s, stroke .3s;
    }
    .conn-line.active { stroke: var(--success); opacity: .9; stroke-dasharray: none; stroke-width: 2.5; }

    /* ======== 节点包装器 ======== */
    .node-wrapper { position: absolute; transition: filter .2s; }

    /* ======== 节点卡片 ======== */
    .node {
      position: relative; width: 260px;
      background: var(--node-bg); border: 1px solid var(--node-border);
      border-radius: var(--radius); cursor: grab; user-select: none;
      box-shadow: var(--shadow-md); transition: all .25s ease;
      backdrop-filter: blur(8px);
    }
    .node::before {
      content: ''; position: absolute; inset: -1px; border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(108,92,231,0.1), transparent 50%);
      pointer-events: none; z-index: 0; opacity: 0; transition: opacity .3s;
    }
    .node:hover { box-shadow: var(--shadow-lg), 0 0 30px rgba(108,92,231,0.08); border-color: var(--node-border-hover); }
    .node:hover::before { opacity: 1; }
    .node.done { border-color: var(--success); box-shadow: var(--shadow-md), 0 0 20px var(--success-glow); }
    .node.running { border-color: var(--warning); animation: pulse 2s ease-in-out infinite; }
    #node-prompts { width: 320px; }
    #node-videoConfig { width: 175px; }
    #node-videoConfig .node-header { padding: 6px 10px; }
    #node-videoConfig .node-body { padding: 2px 10px; }
    #node-videoConfig .node-footer { padding: 6px 10px; gap: 4px; }
    #node-videoConfig .tb-param { font-size: 10px; }
    #node-videoConfig .tb-param label { min-width: 28px; font-size: 10px; }
    #node-videoConfig .tb-select { font-size: 10px; padding: 3px 4px; }
    @keyframes pulse {
      0%,100% { box-shadow: var(--shadow-md), 0 0 0 0 var(--warning-glow); }
      50% { box-shadow: var(--shadow-md), 0 0 20px var(--warning-glow); }
    }

    .node-header {
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border); border-radius: var(--radius) var(--radius) 0 0;
      background: linear-gradient(135deg, rgba(108,92,231,0.06), rgba(0,206,201,0.03));
      cursor: grab; position: relative; z-index: 1;
    }
    .node-icon { font-size: 16px; filter: saturate(1.2); }
    .node-name { font-size: 12px; font-weight: 600; flex: 1; letter-spacing: 0.3px; }
    .node-toggle {
      width: 22px; height: 22px; border: none; border-radius: 6px;
      background: transparent; color: var(--text3); font-size: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .node-toggle:hover { color: var(--text); background: rgba(108,92,231,0.15); }
    .node-status {
      width: 8px; height: 8px; border-radius: 50%; background: var(--border);
      box-shadow: 0 0 6px transparent; transition: all .3s;
    }
    .node.done .node-status { background: var(--success); box-shadow: 0 0 8px var(--success-glow); }
    .node.running .node-status { background: var(--warning); box-shadow: 0 0 8px var(--warning-glow); }

    .node-body { padding: 10px 14px; font-size: 11px; color: var(--text2); line-height: 1.6; position: relative; z-index: 1; }
    .node-footer {
      padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 6px;
      flex-wrap: wrap; position: relative; z-index: 1;
    }

    .node-btn {
      flex: 1; padding: 6px 0; border: none; border-radius: 8px;
      font-size: 11px; cursor: pointer; transition: all .2s ease; text-align: center;
      font-weight: 500; letter-spacing: 0.3px;
    }
    .node-btn-primary {
      background: linear-gradient(135deg, var(--accent), #5a4bd6);
      color: #fff; box-shadow: 0 2px 8px var(--accent-glow);
    }
    .node-btn-primary:hover { background: linear-gradient(135deg, var(--accent-hover), #6c5ce7); box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }
    .node-btn-primary:active { transform: translateY(0); }
    .node-btn-primary:disabled { background: var(--bg3); color: var(--text3); cursor: not-allowed; box-shadow: none; }
    .node-btn-secondary {
      background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
    }
    .node-btn-secondary:hover { background: #252540; border-color: var(--accent); color: var(--text); }

    .port {
      position: absolute; width: 10px; height: 10px; border-radius: 50%;
      background: var(--conn); border: 2px solid var(--node-bg-solid); z-index: 2;
      transition: all .2s; box-shadow: 0 0 4px rgba(0,0,0,0.3);
    }
    .port-in { left: -6px; top: 28px; }
    .port-out { right: -6px; top: 28px; }
    .node.done .port { background: var(--success); box-shadow: 0 0 6px var(--success-glow); }

    /* ======== 节点输出区（now inside node card） ======== */
    .node-output {
      display: none; padding: 8px 14px; border-top: 1px solid var(--border);
      position: relative; z-index: 1;
    }
    .node-output.visible { display: block; }

    .output-columns { display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap; }
    .output-single { }

    .output-col { flex: 1; min-width: 130px; max-width: 200px; }
    .output-col-head {
      font-size: 11px; font-weight: 600; color: var(--accent);
      padding: 5px 10px; background: var(--bg2); border: 1px solid var(--border);
      border-radius: 8px 8px 0 0; border-bottom: none; letter-spacing: 0.3px;
    }
    .output-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; margin-bottom: 4px; font-size: 11px; line-height: 1.5;
      transition: all .2s;
    }
    .output-card:hover { border-color: var(--accent); background: #222240; }
    .output-card strong { color: var(--text); font-weight: 600; }
    .output-card span { color: var(--text2); }

    /* 分镜卡片 */
    .shot-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; font-size: 11px;
      max-width: 360px; transition: all .2s;
      display: flex; flex-direction: column;
    }
    .shot-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(108,92,231,0.1); }
    .shot-card .prompt-ta { flex: 1; height: 0; min-height: 50px; }
    .shot-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .shot-num {
      background: linear-gradient(135deg, var(--accent), #5a4bd6);
      color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600;
      box-shadow: 0 1px 4px var(--accent-glow);
    }
    .shot-meta { font-size: 10px; color: var(--text3); }
    .shot-meta span { margin-right: 6px; }

    /* 分镜/提示词中的参考图缩略图 */
    .shot-refs { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
    .shot-ref-thumb {
      width: 40px; height: 40px; border-radius: 6px; overflow: hidden;
      border: 1px solid var(--border); position: relative; cursor: pointer; transition: all .2s;
    }
    .shot-ref-thumb:hover { border-color: var(--accent); transform: scale(1.05); }
    .shot-ref-thumb img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
    .shot-ref-thumb .ref-tag {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8)); font-size: 8px; color: #fff;
      text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 2px 2px 1px;
    }
    .shot-refs-label { font-size: 9px; color: var(--text3); width: 100%; margin-bottom: 2px; }

    /* 提示词卡片 — 美观重排版 */
    .prompt-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 10px; font-size: 11px;
      transition: all .2s; overflow: hidden;
    }
    .prompt-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(108,92,231,0.1); }
    .prompt-label { font-size: 10px; color: var(--accent); margin-top: 0; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px; }

    /* 卡片头部 */
    .pc-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px 8px; border-bottom: 1px solid var(--border);
      background: linear-gradient(135deg, rgba(108,92,231,0.06), rgba(0,206,201,0.04));
    }
    .pc-head .shot-num { }
    .pc-head-refs { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
    .pc-ref-badge {
      display: inline-flex; align-items: center; gap: 2px; font-size: 9px;
      padding: 1px 6px; border-radius: 8px; line-height: 14px;
    }
    .pc-ref-badge.ok { background: rgba(0,206,201,0.12); color: var(--accent2); }
    .pc-ref-badge.warn { background: rgba(231,76,60,0.1); color: #e07b6a; }
    .pc-ref-badge img { width: 12px; height: 12px; border-radius: 2px; object-fit: cover; }

    /* 提示词区 */
    .pc-prompts { padding: 10px 14px; }
    .pc-prompt-section { margin-bottom: 8px; }
    .pc-prompt-section:last-child { margin-bottom: 0; }
    .pc-prompt-head {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px;
    }
    .pc-prompt-title { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }
    .pc-prompt-title.vid { color: var(--accent2); }
    .pc-prompt-title.img { color: var(--accent); }
    .pc-prompt-actions { display: flex; align-items: center; gap: 3px; }

    /* 媒体生成区 */
    .pc-media {
      display: flex; border-top: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(0,0,0,0.15), transparent);
    }
    .pc-media-col { flex: 1; padding: 8px 14px 10px; min-width: 0; }
    .pc-media-col + .pc-media-col { border-left: 1px solid var(--border); }
    .pc-media-head {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
      gap: 2px; margin-bottom: 6px;
    }
    .pc-media-title { font-size: 10px; font-weight: 700; }
    .pc-media-title.vid { color: var(--accent2); }
    .pc-media-title.img { color: var(--accent); }
    .pc-media-params { display: flex; gap: 3px; align-items: center; flex-wrap: wrap; }
    .pc-media-preview { min-height: 24px; }

    /* 连续提示词查看弹窗 */
    .cont-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999;
      display: flex; flex-direction: column; padding: 30px 40px;
    }
    .cont-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; flex-shrink: 0;
    }
    .cont-header h2 { font-size: 16px; color: var(--accent2); margin: 0; }
    .cont-close-btn {
      background: rgba(231,76,60,0.2); border: 1px solid #e74c3c; color: #e74c3c;
      border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 13px;
    }
    .cont-close-btn:hover { background: #e74c3c; color: #fff; }
    .cont-tabs {
      display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 14px; flex-shrink: 0;
    }
    .cont-tab {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 14px; font-size: 12px; cursor: pointer;
      transition: all .2s;
    }
    .cont-tab.color-a { color: var(--accent); border-color: rgba(108,92,231,0.3); }
    .cont-tab.color-b { color: var(--accent2); border-color: rgba(0,206,201,0.3); }
    .cont-tab:hover { opacity: 0.9; filter: brightness(1.2); }
    .cont-tab.active.color-a {
      background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
    }
    .cont-tab.active.color-b {
      background: var(--accent2); border-color: var(--accent2); color: #0f0f1a; font-weight: 600;
    }
    .cont-body {
      flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px; color: var(--text);
      line-height: 1.8; white-space: pre-wrap; word-break: break-all;
      display: flex; gap: 10px;
    }
    .cont-shot-col {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    .cont-divider-v {
      width: 2px; flex-shrink: 0; background: linear-gradient(180deg, transparent 0%, var(--accent2) 20%, var(--accent2) 80%, transparent 100%);
      border-radius: 1px; position: relative;
    }
    .cont-divider-v::after {
      content: '⟩'; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: var(--accent2); font-size: 14px; font-weight: 700; background: var(--bg2); padding: 2px;
    }
    .cont-edit {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 12px; font-family: inherit; padding: 8px 10px;
      resize: none; line-height: 1.6; flex: 1; min-height: 60px; overflow-y: auto;
    }
    .cont-edit:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-glow); }
    .cont-font-ctrl { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-bottom: 2px; }
    .cont-font-ctrl label { font-size: 10px; color: var(--text-dim); white-space: nowrap; }
    .cont-font-ctrl input[type=range] { width: 60px; height: 12px; accent-color: var(--accent2); cursor: pointer; }
    .cont-font-ctrl .cont-font-val { font-size: 10px; color: var(--accent2); min-width: 20px; text-align: center; }

    /* 连续查看中的参考图引用状态 */
    .cont-ref-section {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
      padding: 4px 8px; margin-bottom: 4px; font-size: 10px; flex-shrink: 0;
    }
    .cont-ref-title { font-size: 9px; color: var(--text3); margin-bottom: 3px; font-weight: 600; }
    .cont-ref-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 4px; }
    .cont-ref-row:last-child { margin-bottom: 0; }
    .cont-ref-cat { font-size: 10px; color: var(--text3); min-width: 56px; flex-shrink: 0; line-height: 22px; }
    .cont-ref-tag {
      display: inline-flex; align-items: center; gap: 3px; font-size: 10px;
      padding: 2px 8px; border-radius: 10px; line-height: 16px;
    }
    .cont-ref-tag.has-img { background: rgba(0,206,201,0.15); color: var(--accent2); border: 1px solid rgba(0,206,201,0.3); }
    .cont-ref-tag.no-img { background: rgba(231,76,60,0.12); color: #e07b6a; border: 1px solid rgba(231,76,60,0.25); }
    .cont-ref-tag img { width: 16px; height: 16px; border-radius: 3px; object-fit: cover; }

    /* 连续查看中可编辑参考图标签 */
    .cont-ref-edit-tag {
      display: inline-flex; align-items: center; gap: 2px;
      font-size: 10px; padding: 2px 8px; border-radius: 10px;
      line-height: 16px; cursor: pointer; transition: all 0.15s;
      border: 1px solid var(--border); color: var(--text3);
      background: transparent; opacity: 0.45; user-select: none;
    }
    .cont-ref-edit-tag:hover { opacity: 0.75; }
    .cont-ref-edit-tag.active {
      opacity: 1; border-color: var(--text2); color: var(--text);
      background: rgba(255,255,255,0.08);
    }
    .cont-ref-edit-tag.has-ref { color: var(--accent2); border-color: rgba(0,206,201,0.3); }
    .cont-ref-edit-tag.active.has-ref {
      background: rgba(0,206,201,0.15); border-color: rgba(0,206,201,0.5); color: var(--accent2);
    }

    /* 内联媒体区域 */
    .inline-media { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 8px; }
    .inline-media-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .inline-media-block { flex: 1; min-width: 140px; }
    .inline-media-head { display: flex; align-items: center; flex-wrap: wrap; gap: 2px; margin-bottom: 4px; }
    .inline-media-title { font-size: 10px; font-weight: 600; color: var(--accent2); }
    .inline-keyframe, .inline-video { min-height: 24px; }
    .inline-video video { max-height: 90px; width: auto; }
    .prompt-ta {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 11px; font-family: inherit; padding: 6px 8px;
      resize: vertical; min-height: 32px; transition: border-color .2s;
    }
    .prompt-ta:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-glow); }
    .prompt-ta-wrap { position: relative; }
    .prompt-ta-wrap .copy-btn,
    .ta-copy-btn {
      position: absolute; top: 4px; right: 4px; background: rgba(108,92,231,0.15);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text3);
      font-size: 10px; padding: 1px 5px; cursor: pointer; opacity: 0; transition: opacity .2s;
      z-index: 2;
    }
    .prompt-ta-wrap:hover .copy-btn { opacity: 0.7; }
    .prompt-ta-wrap .copy-btn:hover,
    .ta-copy-btn:hover { opacity: 1 !important; background: var(--accent); color: #fff; }

    /* 浮动小窗播放器 */
    .pip-player {
      position: fixed; z-index: 99999; background: #111; border: 2px solid var(--accent2);
      border-radius: 10px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      min-width: 200px; min-height: 130px; resize: both;
    }
    .pip-header {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.8); padding: 4px 8px; cursor: move; user-select: none;
    }
    .pip-title { font-size: 10px; color: var(--accent2); font-weight: 600; }
    .pip-close {
      background: none; border: none; color: #e74c3c; font-size: 14px; cursor: pointer; padding: 0 4px;
    }
    .pip-close:hover { color: #fff; }
    .pip-player video { width: 100%; display: block; }
    textarea { position: relative; }
    .ta-wrap { position: relative; display: inline-block; width: 100%; }
    .ta-wrap:hover .ta-copy-btn { opacity: 0.7; }

    /* 图片输出 */
    .img-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .img-thumb { text-align: center; width: 84px; position: relative; }
    .img-thumb img {
      width: 76px; height: 76px; object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border); transition: all .2s; cursor: zoom-in;
    }
    .img-thumb img:hover { border-color: var(--accent); transform: scale(1.03); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
    .img-thumb .img-name { font-size: 11px; color: #fff; margin-top: 3px; font-weight: 600; }
    .ref-port {
      position: absolute; right: -6px; top: 38px; width: 12px; height: 12px;
      border-radius: 50%; background: #333; border: 2px solid #7ecbff;
      cursor: crosshair; z-index: 20; transition: all 0.2s;
    }
    .ref-port:hover, .ref-port.connecting { background: #7ecbff; box-shadow: 0 0 8px rgba(126,203,255,0.8); transform: scale(1.3); }
    .ref-port.has-conn { background: #5aaf5a; border-color: #5aaf5a; }
    .ref-port.has-conn:hover { background: #7ecbff; border-color: #7ecbff; }
    .ref-lines-container { position: relative; }
    #refLinesSvg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; overflow: visible; }
    #refLinesSvg path { pointer-events: stroke; }
    #refLinesSvg line { pointer-events: none; }
    .img-thumb .img-actions { display: flex; gap: 3px; margin-top: 3px; justify-content: center; }
    .img-thumb .img-actions button {
      font-size: 9px; padding: 2px 8px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg3); color: var(--text2);
      cursor: pointer; transition: all .2s;
    }
    .img-thumb .img-actions button:hover { border-color: var(--accent); color: var(--text); background: #252540; }
    .img-placeholder {
      width: 76px; height: 76px; border: 2px dashed var(--border); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--text3);
      cursor: pointer; transition: all .2s; line-height: 1.4;
    }
    .img-placeholder:hover { border-color: var(--accent); color: var(--text2); background: rgba(108,92,231,0.05); }
    .img-placeholder.drag-over { border-color: var(--accent2); background: rgba(0,206,201,0.08); }

    /* 剧本输出 */
    .script-output { max-width: 380px; }
    .script-ta {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 12px; font-family: inherit; padding: 10px 12px;
      resize: vertical; min-height: 80px; line-height: 1.6; transition: border-color .2s;
    }
    .script-ta:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-glow); }
    .script-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }

    /* 视觉风格输入框 */
    .style-selector { margin-top: 8px; display: flex; gap: 8px; align-items: center; }
    .style-selector label { font-size: 11px; color: var(--text2); white-space: nowrap; font-weight: 500; }
    .style-input {
      flex: 1; padding: 5px 10px; border-radius: 8px; font-size: 12px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      font-family: inherit; transition: border-color .2s; outline: none;
    }
    .style-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    .style-input::placeholder { color: var(--text3); }

    /* 视频参数选择器 */
    .tb-param { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text2); width: 100%; }
    .tb-param label { white-space: nowrap; min-width: 32px; font-weight: 500; }
    .tb-select {
      padding: 4px 6px; border-radius: 6px; font-size: 11px; flex: 1;
      border: 1px solid var(--border); background: var(--bg); color: var(--text);
      cursor: pointer; outline: none; transition: border-color .2s;
    }
    .tb-select:focus { border-color: var(--accent); }

    /* ======== 搞笑视频热榜面板 ======== */
    .hot-btn-wrap { position: relative; }
    .hot-panel {
      position: absolute; top: 42px; left: 0; width: 420px; max-height: 560px;
      background: linear-gradient(180deg, #1a1a2e, var(--bg2));
      border: 1px solid var(--border); border-radius: 12px;
      z-index: 300; display: none; overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    .hot-panel.open { display: flex; flex-direction: column; }
    .hot-panel-header {
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1a1a2e, #161625);
    }
    .hot-panel-header h3 { font-size: 13px; font-weight: 600; margin: 0; white-space: nowrap; }
    .hot-sort {
      margin-left: auto; padding: 3px 8px; border-radius: 6px; font-size: 10px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text2);
      cursor: pointer; outline: none;
    }
    .hot-refresh-btn {
      padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text2); font-size: 11px; cursor: pointer;
      transition: all .2s; white-space: nowrap;
    }
    .hot-refresh-btn:hover { border-color: var(--accent); color: var(--text); }
    .hot-list {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }
    .hot-item {
      display: flex; align-items: flex-start; gap: 10px; padding: 8px 14px;
      cursor: pointer; transition: background .15s; border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .hot-item:hover { background: rgba(108,92,231,.1); }
    .hot-rank {
      min-width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
      background: var(--bg3); margin-top: 2px;
    }
    .hot-item:nth-child(1) .hot-rank { background: linear-gradient(135deg, #ff6b6b, #ee5a24); }
    .hot-item:nth-child(2) .hot-rank { background: linear-gradient(135deg, #ffa502, #e67e22); }
    .hot-item:nth-child(3) .hot-rank { background: linear-gradient(135deg, #ffd32a, #f7b731); color: #333; }
    .hot-cover {
      width: 80px; height: 50px; border-radius: 6px; object-fit: cover;
      flex-shrink: 0; background: var(--bg3);
    }
    .hot-info { flex: 1; min-width: 0; }
    .hot-title {
      font-size: 12px; color: var(--text); line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .hot-meta {
      display: flex; gap: 10px; margin-top: 3px; font-size: 10px; color: var(--text3);
    }
    .hot-meta span { white-space: nowrap; }
    .hot-empty {
      padding: 32px; text-align: center; color: var(--text3); font-size: 12px;
    }

    /* ======== 资产库侧边栏 ======== */
    .asset-panel {
      position: fixed; top: 48px; left: 0; bottom: 0; width: 240px;
      background: linear-gradient(180deg, #1a1a2e, var(--bg2));
      border-right: 1px solid var(--border);
      z-index: 200; transform: translateX(-100%);
      transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;
      box-shadow: 8px 0 40px rgba(0,0,0,0.5);
    }
    .asset-panel.open { transform: translateX(0); }
    .asset-panel-header {
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: linear-gradient(180deg, #1a1a2e, #161625); z-index: 1;
      backdrop-filter: blur(12px);
    }
    .asset-panel-header h3 { font-size: 13px; font-weight: 600; }
    .asset-cat-title {
      font-size: 11px; font-weight: 600; color: var(--text2); padding: 10px 16px 4px;
      border-bottom: 1px solid var(--border); letter-spacing: 0.5px;
    }
    .asset-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 8px 12px;
    }
    .asset-item {
      position: relative; border-radius: 8px; overflow: hidden; cursor: grab;
      border: 1px solid var(--border); background: var(--bg3); transition: all .2s;
      aspect-ratio: 1;
    }
    .asset-item:hover { border-color: var(--accent); box-shadow: 0 0 12px rgba(108,92,231,.3); }
    .asset-item:active { cursor: grabbing; }
    .asset-item img {
      width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in;
    }
    .asset-item .asset-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      font-size: 9px; color: #fff; padding: 2px 6px;
      background: linear-gradient(transparent, rgba(0,0,0,.8));
      text-overflow: ellipsis; overflow: hidden; white-space: nowrap;
    }
    .img-thumb.drag-over-asset,
    .img-placeholder.drag-over-asset {
      outline: 2px dashed var(--accent) !important;
      outline-offset: -2px;
      background: rgba(108,92,231,.1) !important;
    }

    /* ======== 图片候选选择弹窗 ======== */
    .img-candidates-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.7); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
    }
    /* 大图查看器 */
    .img-viewer-overlay {
      position: fixed; inset: 0; z-index: 600;
      background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .img-viewer-box {
      position: relative; max-width: 90vw; max-height: 90vh;
      cursor: default; user-select: none;
      resize: both; overflow: auto;
      border: 1px solid var(--border); border-radius: 8px;
      background: #111;
    }
    .img-viewer-box img {
      display: block; width: 100%; height: 100%; object-fit: contain;
      border-radius: 8px;
    }
    .img-viewer-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 12px; background: rgba(0,0,0,.7);
      color: #fff; font-size: 13px; text-align: center;
      border-radius: 0 0 8px 8px;
    }
    .img-viewer-close {
      position: absolute; top: 8px; right: 8px; width: 28px; height: 28px;
      border-radius: 50%; background: rgba(0,0,0,.6); color: #fff;
      border: none; cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .img-viewer-close:hover { background: rgba(255,0,0,.6); }
    .img-candidates-box {
      background: linear-gradient(180deg, #1a1a2e, var(--bg2));
      border: 1px solid var(--border); border-radius: 14px;
      padding: 18px; max-width: 420px; width: 88%;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }
    .img-candidates-title {
      font-size: 13px; font-weight: 600; margin-bottom: 12px;
      color: var(--text); text-align: center;
    }
    .img-candidates-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 14px;
    }
    .img-candidate {
      position: relative; border-radius: 8px; overflow: hidden;
      border: 2px solid var(--border); cursor: pointer;
      transition: all .2s; aspect-ratio: 1;
    }
    .img-candidate:hover { border-color: var(--accent); transform: scale(1.03); }
    .img-candidate.selected {
      border-color: var(--accent2); box-shadow: 0 0 16px rgba(0,206,201,.4);
    }
    .img-candidate img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .img-candidate .candidate-badge {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      border-radius: 50%; background: var(--accent2); color: #fff;
      font-size: 12px; font-weight: 700; display: none;
      align-items: center; justify-content: center;
    }
    .img-candidate.selected .candidate-badge { display: flex; }
    .img-candidates-actions {
      display: flex; gap: 10px; justify-content: center;
    }
    .img-candidates-actions button {
      padding: 8px 24px; border: none; border-radius: 8px;
      font-size: 13px; cursor: pointer; font-weight: 500; transition: all .2s;
    }
    .img-candidates-actions .btn-confirm {
      background: linear-gradient(135deg, var(--accent), #5a4bd6); color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .img-candidates-actions .btn-confirm:hover { box-shadow: 0 4px 16px var(--accent-glow); }
    .img-candidates-actions .btn-cancel {
      background: var(--bg3); color: var(--text2); border: 1px solid var(--border);
    }
    .img-candidates-actions .btn-cancel:hover { border-color: var(--accent); color: var(--text); }

    /* ======== 右侧面板 ======== */
    .panel-overlay {
      position: fixed; top: 48px; right: 0; bottom: 0; width: 500px;
      background: linear-gradient(180deg, #1a1a2e, var(--bg2));
      border-left: 1px solid var(--border);
      z-index: 200; transform: translateX(100%);
      transition: transform .3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto;
      box-shadow: -8px 0 40px rgba(0,0,0,0.5);
    }
    .panel-overlay.open { transform: translateX(0); }
    .panel-header {
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); position: sticky; top: 0;
      background: linear-gradient(180deg, #1a1a2e, #161625); z-index: 1;
      backdrop-filter: blur(12px);
    }
    .panel-header h3 { font-size: 14px; font-weight: 600; letter-spacing: 0.3px; }
    .panel-close {
      width: 30px; height: 30px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg3); color: var(--text2); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .2s;
    }
    .panel-close:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    .panel-body { padding: 14px 16px; }

    .p-group { margin-bottom: 16px; }
    .p-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; }
    .p-input {
      width: 100%; background: var(--bg); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 12px; font-size: 13px; font-family: inherit; transition: border-color .2s;
    }
    .p-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-glow); }
    .p-btn-group { display: flex; gap: 8px; margin: 10px 0; flex-wrap: wrap; }
    .p-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      font-size: 12px; cursor: pointer; transition: all .2s; font-weight: 500;
    }
    .p-btn-primary {
      background: linear-gradient(135deg, var(--accent), #5a4bd6); color: #fff;
      box-shadow: 0 2px 8px var(--accent-glow);
    }
    .p-btn-primary:hover { box-shadow: 0 4px 16px var(--accent-glow); transform: translateY(-1px); }
    .p-btn-secondary { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
    .p-btn-secondary:hover { background: #252540; border-color: var(--accent); color: var(--text); }
    .p-msg { font-size: 12px; margin: 6px 0; min-height: 16px; }

    .loading-spin {
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed; top: 60px; right: 16px;
      background: linear-gradient(135deg, #1e1e32, #252540); border: 1px solid var(--accent);
      border-radius: 10px; padding: 12px 20px; z-index: 9999; font-size: 13px;
      animation: fadeSlide .3s cubic-bezier(0.4,0,0.2,1);
      box-shadow: var(--shadow-md), var(--shadow-glow);
      backdrop-filter: blur(8px);
    }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(-12px); } }

    .minimap {
      position: absolute; bottom: 16px; right: 16px;
      width: 160px; height: 100px; background: rgba(15,15,26,0.85);
      border: 1px solid var(--border); border-radius: 10px;
      z-index: 50; overflow: hidden; backdrop-filter: blur(8px);
      box-shadow: var(--shadow-md);
    }
    .minimap-viewport { position: absolute; border: 1px solid var(--accent); background: rgba(108,92,231,0.1); border-radius: 2px; }
    .minimap-node { position: absolute; background: var(--accent); border-radius: 2px; opacity: .4; }

    /* 滚动条美化 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
    ::-webkit-scrollbar-thumb { background: rgba(108,92,231,0.4); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(108,92,231,0.7); }

    /* 单项参数覆盖选择器 */
    .item-params {
      display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; align-items: center;
    }
    .item-params select {
      font-size: 9px; padding: 1px 4px; border-radius: 4px;
      border: 1px solid var(--border); background: var(--bg); color: var(--text2);
      cursor: pointer; outline: none; transition: border-color .2s;
    }
    .item-params select:focus { border-color: var(--accent); }
    .item-params label { font-size: 9px; color: var(--text3); }

    /* ======== 时间轴多轨道播放器 ======== */
    .tl-container { padding: 8px; }
    .tl-preview { position: relative; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 8px; aspect-ratio: 16/9; max-height: 200px; }
    .tl-preview video { width: 100%; height: 100%; object-fit: contain; display: block; }
    .tl-preview-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 12px; }
    .tl-controls { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; padding: 0 2px; }
    .tl-btn { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
    .tl-btn:hover { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
    .tl-btn.active { background: var(--accent); border-color: var(--accent); }
    .tl-time { font-size: 11px; color: var(--text2); font-variant-numeric: tabular-nums; min-width: 100px; text-align: center; }
    .tl-ruler { position: relative; height: 20px; background: var(--bg2); border-radius: 4px 4px 0 0; border: 1px solid var(--border); border-bottom: none; overflow: hidden; cursor: pointer; }
    .tl-ruler-tick { position: absolute; top: 0; width: 1px; height: 100%; background: var(--border); }
    .tl-ruler-label { position: absolute; top: 2px; font-size: 9px; color: var(--text3); transform: translateX(2px); white-space: nowrap; }
    .tl-playhead { position: absolute; top: -4px; width: 2px; height: calc(100% + 4px); background: var(--error); z-index: 10; pointer-events: auto; cursor: grab; transition: left 0.05s linear; }
    .tl-playhead::before { content: ''; position: absolute; top: 0; left: -6px; width: 14px; height: 10px; background: var(--error); border-radius: 3px; cursor: grab; }
    .tl-playhead:active, .tl-playhead:active::before { cursor: grabbing; }
    .tl-track { position: relative; height: 48px; background: var(--bg); border: 1px solid var(--border); border-radius: 0 0 4px 4px; overflow: visible; cursor: pointer; margin-left: 32px; }
    .tl-track-toggle { position: absolute; left: -30px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg2); color: var(--text3); font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 5; transition: all .15s; }
    .tl-track-toggle:hover { border-color: var(--accent); color: var(--text); }
    .tl-track-toggle.hidden { opacity: 0.4; }
    .tl-track-label { position: absolute; left: 4px; top: 2px; font-size: 8px; color: var(--text3); z-index: 5; pointer-events: none; }
    .tl-clip { position: absolute; top: 4px; height: 40px; border-radius: 4px; overflow: hidden; cursor: grab; transition: opacity .15s; border: 1px solid transparent; display: flex; align-items: center; }
    .tl-clip:hover { border-color: var(--accent); }
    .tl-clip.playing { border-color: var(--success); box-shadow: 0 0 8px var(--success-glow); }
    .tl-clip.dragging { opacity: 0.5; }
    .tl-clip-bg { position: absolute; inset: 0; background: linear-gradient(135deg, #2a2a50, #1e1e3a); }
    .tl-clip-label { position: relative; z-index: 1; font-size: 9px; color: var(--text); padding: 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
    .tl-clip-dur { position: absolute; right: 4px; bottom: 2px; font-size: 8px; color: var(--text3); z-index: 1; }
    .tl-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 11px; }
    .tl-total { font-size: 10px; color: var(--text3); text-align: right; margin-top: 4px; }

    /* 可调大小节点 */
    .node.node-resizable { width: auto; min-width: 300px; min-height: 200px; display: flex; flex-direction: column; overflow: hidden; }
    .node.node-resizable .node-output { flex: 1; overflow-y: auto; }
    .node.node-resizable .tl-container { height: 100%; display: flex; flex-direction: column; }

<script>

// 全局状态

const API = '';
let currentProject = null;
let _projectSwitchCount = 0;

function setRefImageParam(key, value) {
  refImageParams[key] = value;

}
function syncCardRefImageSelectors() {
  document.querySelectorAll('.img-thumb .item-params select').forEach(sel => {
    const oc = sel.getAttribute('onchange') || '';
    if (!oc.includes('setItemRefImageParam')) return;
    const m = oc.match(/setItemRefImageParam\('([^']+)','([^']+)'/);
    if (!m) return;
    const key = m[1] + '-' + m[2];
    if (itemRefImageOverrides[key]) return;
    sel.value = refImageParams.model;
  });
}

function setShotImageParam(key, value) {
  shotImageParams[key] = value;
  const ratioRow = document.getElementById('shot-img-ratio-row');
  if (key === 'model' && ratioRow) ratioRow.style.display = value === 'jimeng' ? 'flex' : 'none';
  syncCardImageSelectors();
  if (currentProject) {
    apiCall('/api/project/set-style', { projectPath: currentProject, shotImageParams }).catch(() => {});
  }
}

// 每个项目的独立参数覆盖
let itemVideoOverrides = {};   // { shotIndex: { model, aspectRatio, duration } }
let itemRefImageOverrides = {}; // { 'category-name': { model, aspectRatio } }
let itemShotImageOverrides = {}; // { shotIndex: { model, aspectRatio } }

/** 全局视频参数变化时，同步未单独覆盖的卡片选择器 */
function syncCardVideoSelectors() {
  document.querySelectorAll('.prompt-card').forEach((card, i) => {
    if (itemVideoOverrides[i]) return; // 已有独立覆盖，不动
    const sels = card.querySelectorAll('.pc-media-col:first-child select');
    sels.forEach(sel => {
      const oc = sel.getAttribute('onchange') || '';
      if (oc.includes("'model'")) sel.value = videoParams.model;
      if (oc.includes("'aspectRatio'")) sel.value = videoParams.aspectRatio;
      if (oc.includes("'duration'")) sel.value = String(videoParams.duration);
    });
  });
}

/** 全局图片参数变化时，同步未单独覆盖的卡片选择器 */
function syncCardImageSelectors() {
  document.querySelectorAll('.prompt-card').forEach((card, i) => {
    if (itemShotImageOverrides[i]) return;
    const sels = card.querySelectorAll('.pc-media-col:last-child select');
    sels.forEach(sel => {
      const oc = sel.getAttribute('onchange') || '';
      if (oc.includes("'model'")) {
        sel.value = shotImageParams.model;
        const ratioSel = sel.parentElement.querySelector('.si-inline-ratio');
        if (ratioSel) ratioSel.style.display = shotImageParams.model === 'jimeng' ? '' : 'none';
      }
      if (oc.includes("'aspectRatio'")) sel.value = shotImageParams.aspectRatio;
    });
  });
}

function setItemVideoParam(shotIdx, key, value) {
  if (!itemVideoOverrides[shotIdx]) itemVideoOverrides[shotIdx] = { ...videoParams };
  itemVideoOverrides[shotIdx][key] = value;
}
function setItemRefImageParam(category, name, key, value) {
  const k = category + '-' + name;
  if (!itemRefImageOverrides[k]) itemRefImageOverrides[k] = { ...refImageParams };
  itemRefImageOverrides[k][key] = value;
}
function setItemShotImageParam(shotIdx, key, value) {
  if (!itemShotImageOverrides[shotIdx]) itemShotImageOverrides[shotIdx] = { ...shotImageParams };
  itemShotImageOverrides[shotIdx][key] = value;
}

function getItemVideoParams(shotIdx) {
  return itemVideoOverrides[shotIdx] || videoParams;
}
function getItemRefImageParams(category, name) {
  return itemRefImageOverrides[category + '-' + name] || refImageParams;
}
function getItemShotImageParams(shotIdx) {
  return itemShotImageOverrides[shotIdx] || shotImageParams;
}

// ====== 分镜增删插 ======
function deleteShot(idx) {
  if (!cachedShots.length && !cachedShotPlans.length) return;
  const shotNum = (cachedShotPlans[idx]?.shotNumber || cachedShots[idx]?.shotNumber || (idx + 1));
  if (!confirm(`确定删除镜头 ${shotNum} 吗？`)) return;
  if (cachedShotPlans.length > idx) cachedShotPlans.splice(idx, 1);
  if (cachedShots.length > idx) cachedShots.splice(idx, 1);
  // 重新编号
  cachedShotPlans.forEach((s, i) => s.shotNumber = i + 1);
  cachedShots.forEach((s, i) => s.shotNumber = i + 1);
  // 移除被删除索引及之后的参数覆盖（索引已变化）
  const newVideoOv = {};
  for (const [k, v] of Object.entries(itemVideoOverrides)) {
    const ki = parseInt(k);
    if (ki < idx) newVideoOv[ki] = v;
    else if (ki > idx) newVideoOv[ki - 1] = v;
  }
  itemVideoOverrides = newVideoOv;
  const newShotImgOv = {};
  for (const [k, v] of Object.entries(itemShotImageOverrides)) {
    const ki = parseInt(k);
    if (ki < idx) newShotImgOv[ki] = v;
    else if (ki > idx) newShotImgOv[ki - 1] = v;
  }
  itemShotImageOverrides = newShotImgOv;
  // 重新渲染
  if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
  renderPromptsOutput(cachedShots);
  saveShotPlansDebounced();
  if (currentProject) apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
  toast(`镜头 ${shotNum} 已删除`);
}

function addShot() {
  const num = Math.max(cachedShotPlans.length, cachedShots.length) + 1;
  const newPlan = { shotNumber: num, content: '', background: '', scene: '', characters: [], props: [], cameraAngle: '中景' };
  const newShot = { shotNumber: num, videoPrompt: '', imagePrompt: '', videoUrl: null, keyFrameUrl: null, scene: '', characters: [], props: [] };
  cachedShotPlans.push(newPlan);
  cachedShots.push(newShot);
  if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
  renderPromptsOutput(cachedShots);
  saveShotPlansDebounced();
  if (currentProject) apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
  toast(`已添加镜头 ${num}`);
  // 滚动到新卡片
  setTimeout(() => {
    const card = document.getElementById('prompt-card-' + (num - 1));
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function insertShot(afterIdx) {
  const newPlan = { shotNumber: 0, content: '', background: '', scene: '', characters: [], props: [], cameraAngle: '中景' };
  const newShot = { shotNumber: 0, videoPrompt: '', imagePrompt: '', videoUrl: null, keyFrameUrl: null, scene: '', characters: [], props: [] };
  const insertAt = afterIdx + 1;
  if (cachedShotPlans.length >= insertAt) cachedShotPlans.splice(insertAt, 0, newPlan);
  else cachedShotPlans.push(newPlan);
  if (cachedShots.length >= insertAt) cachedShots.splice(insertAt, 0, newShot);
  else cachedShots.push(newShot);
  // 重新编号
  cachedShotPlans.forEach((s, i) => s.shotNumber = i + 1);
  cachedShots.forEach((s, i) => s.shotNumber = i + 1);
  // 调整参数覆盖索引
  const newVideoOv = {};
  for (const [k, v] of Object.entries(itemVideoOverrides)) {
    const ki = parseInt(k);
    if (ki < insertAt) newVideoOv[ki] = v;
    else newVideoOv[ki + 1] = v;
  }
  itemVideoOverrides = newVideoOv;
  const newShotImgOv = {};
  for (const [k, v] of Object.entries(itemShotImageOverrides)) {
    const ki = parseInt(k);
    if (ki < insertAt) newShotImgOv[ki] = v;
    else newShotImgOv[ki + 1] = v;
  }
  itemShotImageOverrides = newShotImgOv;
  // 重新渲染
  if (cachedShotPlans.length) renderShotsOutput(cachedShotPlans);
  renderPromptsOutput(cachedShots);
  saveShotPlansDebounced();
  if (currentProject) apiCall('/api/workflow/save-prompts', { projectPath: currentProject, shots: cachedShots });
  toast(`已在镜头 ${afterIdx + 1} 后插入新镜头`);
  setTimeout(() => {
    const card = document.getElementById('prompt-card-' + insertAt);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

let zoom = 1, panX = 0, panY = 0;
let isPanning = false, panStartX = 0, panStartY = 0;
let dragNode = null, dragOffX = 0, dragOffY = 0;

const viewport = document.getElementById('viewport');
const canvas = document.getElementById('canvas');
const connSvg = document.getElementById('connSvg');
const panel = document.getElementById('panel');

// ============================
// 节点定义
// ============================
const NODES = [
  { id: 'script',      icon: '📝', name: '1. 剧本导入',   x: 100,  y: 180, desc: '导入剧本' },
  { id: 'analyze',     icon: '🔍', name: '2. 提取',       x: 380,  y: 180, desc: '提取角色、场景、道具' },
  { id: 'images',      icon: '🎨', name: '3. 参考图',     x: 660,  y: 180, desc: '角色/场景/道具参考图' },
  { id: 'shots',       icon: '🎬', name: '4. 分镜',       x: 940,  y: 180, desc: '自动分镜头与规划' },
  { id: 'prompts',     icon: '✨', name: '5. 分镜详情',   x: 1220, y: 180, desc: '提示词 · 关键帧 · 视频' },
  { id: 'timeline',    icon: '🎞', name: '6. 时间轴',     x: 1600, y: 180, desc: '多轨道预览 · 顺序播放' },
];

const EDGES = [
  ['script', 'analyze'],
  ['analyze', 'images'],
  ['images', 'shots'],
  ['shots', 'prompts'],
  ['prompts', 'timeline'],
];

const nodeState = {};
const nodeOutputVisible = {};
NODES.forEach(n => { nodeState[n.id] = 'idle'; nodeOutputVisible[n.id] = false; });

const wrapperDoms = {};  // wrapper div (for positioning)
const nodeDoms = {};     // .node card div (for dimensions / class toggling)

// ============================
// 画布：平移 & 缩放
// ============================
function applyTransform() {
  canvas.style.zoom = zoom;
  canvas.style.transform = 'none';
  canvas.style.left = (panX / zoom) + 'px';
  canvas.style.top = (panY / zoom) + 'px';
  document.getElementById('zoom-pct').textContent = Math.round(zoom * 100) + '%';
  updateMinimap();
}

function zoomBy(delta) {
  const newZoom = Math.max(0.2, Math.min(3, zoom + delta));
  const rect = viewport.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const ratio = newZoom / zoom;
  panX = cx - ratio * (cx - panX);
  panY = cy - ratio * (cy - panY);
  zoom = newZoom;
  applyTransform();
}

function fitView() {
  if (!NODES.length) return;
  const rect = viewport.getBoundingClientRect();
  // 在 zoom=1 下测量节点尺寸
  const oldZoom = canvas.style.zoom;
  canvas.style.zoom = 1;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  NODES.forEach(n => {
    const w = wrapperDoms[n.id] ? wrapperDoms[n.id].offsetWidth : 260;
    const h = wrapperDoms[n.id] ? wrapperDoms[n.id].offsetHeight : 120;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w); maxY = Math.max(maxY, n.y + h);
  });
  canvas.style.zoom = oldZoom;
  const cw = maxX - minX + 100, ch = maxY - minY + 100;
  zoom = Math.min(1.2, Math.min((rect.width - 40) / cw, (rect.height - 40) / ch));
  panX = (rect.width - cw * zoom) / 2 - minX * zoom + 50 * zoom;
  panY = (rect.height - ch * zoom) / 2 - minY * zoom + 50 * zoom;
  applyTransform();
}

viewport.addEventListener('mousedown', e => {
  if (e.target.closest('.node-wrapper') || e.target.closest('.panel-overlay') || e.target.closest('.asset-panel')) return;
  isPanning = true;
  panStartX = e.clientX - panX;
  panStartY = e.clientY - panY;
  viewport.classList.add('grabbing');
});

window.addEventListener('mousemove', e => {
  if (isPanning) { panX = e.clientX - panStartX; panY = e.clientY - panStartY; applyTransform(); return; }
  if (dragNode) {
    const n = NODES.find(n => n.id === dragNode);
    n.x = (e.clientX - panX - dragOffX) / zoom;
    n.y = (e.clientY - panY - dragOffY) / zoom;
    wrapperDoms[dragNode].style.left = n.x + 'px';
    wrapperDoms[dragNode].style.top = n.y + 'px';
    drawConnections(); updateMinimap();
  }
});

window.addEventListener('mouseup', () => { isPanning = false; dragNode = null; viewport.classList.remove('grabbing'); });

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = viewport.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const newZoom = Math.max(0.2, Math.min(3, zoom + delta));
  const ratio = newZoom / zoom;
  panX = mx - ratio * (mx - panX);
  panY = my - ratio * (my - panY);
  zoom = newZoom;
  applyTransform();
}, { passive: false });

// 渲染节点

function createNodeDom(n) {

  const div = document.createElement('div');

  div.id = 'node-' + n.id;

  const hasIn = EDGES.some(e => e[1] === n.id);
  const hasOut = EDGES.some(e => e[0] === n.id);

  div.innerHTML = `
    ${hasIn ? '<div class="port port-in"></div>' : ''}
    ${hasOut ? '<div class="port port-out"></div>' : ''}

      <span class="node-status"></span>
    </div>
    <div class="node-body">
      <div class="info">${n.desc}</div>
      <div class="node-extra" id="extra-${n.id}"></div>
      <div class="p-msg" id="msg-${n.id}"></div>
    </div>
    <div class="node-footer">${getNodeButtons(n.id)}</div>
    <div class="node-output" id="output-${n.id}"></div>
  `;

  // 时间轴节点：可调大小
  if (n.id === 'timeline') {
    div.classList.add('node-resizable');
    div.style.width = '520px';
    div.innerHTML += `
      <div class="node-resize-handle rh-right" data-dir="e"></div>
      <div class="node-resize-handle rh-bottom" data-dir="s"></div>
      <div class="node-resize-handle rh-corner" data-dir="se"></div>
    `;
    div.querySelectorAll('.node-resize-handle').forEach(handle => {
      handle.addEventListener('mousedown', e => {
        e.stopPropagation();
        const dir = handle.dataset.dir;
        const startX = e.clientX, startY = e.clientY;
        const startW = div.offsetWidth, startH = div.offsetHeight;
        const onMove = (me) => {
          me.preventDefault();
          const dx = (me.clientX - startX) / zoom;
          const dy = (me.clientY - startY) / zoom;
          if (dir.includes('e')) div.style.width = Math.max(300, startW + dx) + 'px';
          if (dir.includes('s')) div.style.height = Math.max(200, startH + dy) + 'px';
          requestAnimationFrame(() => { drawConnections(); updateMinimap(); });
        };
        const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });
  }

  // 拖拽
  div.querySelector('.node-header').addEventListener('mousedown', e => {
    if (e.target.closest('.node-toggle')) return;
    e.stopPropagation();
    dragNode = n.id;
    dragOffX = e.clientX - panX - n.x * zoom;
    dragOffY = e.clientY - panY - n.y * zoom;
  });

  wrapper.appendChild(div);
  canvas.appendChild(wrapper);

  wrapperDoms[n.id] = wrapper;
  nodeDoms[n.id] = div;
}

// ============================
// 绘制连线
// ============================
function drawConnections() {
  let svg = '';
  const z = zoom || 1;
  EDGES.forEach(([from, to]) => {
    const fromN = NODES.find(n => n.id === from);
    const toN = NODES.find(n => n.id === to);
    const fromCard = nodeDoms[from];
    const toCard = nodeDoms[to];
    if (!fromCard || !toCard) return;

    const fw = fromCard.offsetWidth / z;
    const fh = fromCard.offsetHeight / z;

    // 出口：右侧中心
    const x1 = fromN.x + fw;
    const y1 = fromN.y + fh / 2;
    // 入口：左侧中心
    const x2 = toN.x;
    const y2 = toN.y + (toCard.offsetHeight / z) / 2;

    const dx = Math.max(60, Math.abs(x2 - x1) * 0.4);
    const isActive = nodeState[from] === 'done';
    const cls = isActive ? 'conn-line active' : 'conn-line';

    svg += `<path class="${cls}" d="M${x1},${y1} C${x1+dx},${y1} ${x2-dx},${y2} ${x2},${y2}"/>`;
  });
  connSvg.innerHTML = svg;
}

// ============================
// 缩略图
// ============================
function updateMinimap() {
  const mm = document.getElementById('minimap');
  const vw = viewport.clientWidth, vh = viewport.clientHeight;
  const z = zoom || 1;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  NODES.forEach(n => {
    const w = wrapperDoms[n.id] ? wrapperDoms[n.id].offsetWidth / z : 260;
    const h = wrapperDoms[n.id] ? wrapperDoms[n.id].offsetHeight / z : 120;
    minX = Math.min(minX, n.x); minY = Math.min(minY, n.y);
    maxX = Math.max(maxX, n.x + w); maxY = Math.max(maxY, n.y + h);
  });
  const pad = 50; minX -= pad; minY -= pad; maxX += pad; maxY += pad;
  const cw = maxX - minX, ch = maxY - minY;
  const mmW = 160, mmH = 100;
  const scale = Math.min(mmW / cw, mmH / ch);

  let html = '';
  NODES.forEach(n => {
    const x = (n.x - minX) * scale, y = (n.y - minY) * scale;
    const w = ((nodeDoms[n.id]?.offsetWidth || 260 * z) / z) * scale;
    const bg = nodeState[n.id] === 'done' ? 'var(--success)' : nodeState[n.id] === 'running' ? 'var(--warning)' : 'var(--conn)';
    html += `<div class="minimap-node" style="left:${x}px;top:${y}px;width:${w}px;height:${Math.max(6, 10*scale)}px;background:${bg}"></div>`;
  });
  const vpX = (-panX / z - minX) * scale, vpY = (-panY / z - minY) * scale;
  const vpW = (vw / z) * scale, vpH = (vh / z) * scale;
  html += `<div class="minimap-viewport" style="left:${vpX}px;top:${vpY}px;width:${vpW}px;height:${vpH}px"></div>`;
  mm.innerHTML = html;
}

function formatPlay(n) {
  if (typeof n === 'string') n = parseInt(n) || 0;
  if (n >= 10000) return (n / 10000).toFixed(1) + '万';

async function fetchHotList() {
  const list = document.getElementById('hotList');
  const keyword = document.getElementById('hotKeyword').value.trim() || '沙雕动漫';
  const order = document.getElementById('hotSort').value;
  list.innerHTML = '<div class="hot-empty">加载中…</div>';

  try {
    const params = new URLSearchParams({ keyword, order, pageSize: 30, days: document.getElementById('hotDays').value });
    const resp = await fetch(`${API}/api/bilibili/funny?${params}`);
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error);
    if (!data.items.length) { list.innerHTML = '<div class="hot-empty">暂无数据</div>'; return; }

    list.innerHTML = data.items.map(it => {
      const safeTitle = it.title.replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const safeUrl = escHtml(it.url || '').replace(/'/g, '&#39;');
      return `<div class="hot-item" onclick="window.api?.openExternal('${safeUrl}')">
        <span class="hot-rank">${it.rank}</span>
        <img class="hot-cover" src="${escHtml(it.cover || '')}" loading="lazy" referrerpolicy="no-referrer" alt="" />
        <div class="hot-info">
          <div class="hot-title">${safeTitle}</div>
          <div class="hot-meta">
            <span>👤 ${escHtml(it.author)}</span>
            <span>▶ ${formatPlay(it.play)}</span>
            <span>💬 ${formatPlay(it.danmaku)}</span>
            <span>⏱ ${escHtml(String(it.duration))}</span>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('hotPanel').dataset.loaded = '1';
  } catch (err) {
    list.innerHTML = `<div class="hot-empty">加载失败: ${escHtml(err.message)}</div>`;
  }
}

// 把原始URL转为可加载的src（绝对路径走代理）
function toImgSrc(url) {
  if (!url) return '';
  if (url.startsWith('/') || url.startsWith('http') || url.startsWith('data:')) return url;
  // Windows 绝对路径 → 代理
  if (/^[A-Z]:\\/i.test(url)) return '/api/local-file?path=' + encodeURIComponent(url);
  return url;
}

function renderAssetCategory(imgs, catLabel) {
  let html = '';
  for (const [name, url] of Object.entries(imgs)) {
    if (!url) continue;
    const eName = name.replace(/"/g, '&quot;');
    const src = toImgSrc(url);
    html += `<div class="asset-item" draggable="true"
      ondragstart="onAssetDragStart(event,'','${eName}','${escHtml(url)}')"
      title="${name}" data-filepath="${escHtml(url)}">
      <img src="${escHtml(src)}" alt="${name}">
      <div class="asset-label">${name}</div>
    </div>`;
  }
  return html;
}

async function refreshAssetPanel() {
  const body = document.getElementById('assetPanelBody');
  const catLabel = { characters: '👤 角色', scenes: '🏠 场景', props: '🔧 道具' };

  let html = '';

  // 当前项目资产
  const hasCurrentAny = Object.values(cachedRefImages).some(cat => Object.keys(cat).length > 0);
  if (hasCurrentAny) {
    html += '<div class="asset-cat-title" style="color:var(--accent);">📌 当前项目</div>';
    for (const cat of ['characters', 'scenes', 'props']) {
      const imgs = cachedRefImages[cat] || {};
      if (!Object.keys(imgs).length) continue;
      html += `<div class="asset-cat-title">${catLabel[cat]}</div><div class="asset-grid">`;
      html += renderAssetCategory(imgs, cat);
      html += '</div>';
    }
  }

  // 历史项目资产
  try {
    const exclude = currentProject ? encodeURIComponent(currentProject) : '';
    const projects = await apiCall('/api/assets/library?exclude=' + exclude);
    for (const proj of projects) {
      let projHasContent = false;
      let projHtml = `<div class="asset-cat-title" style="color:var(--text2);margin-top:8px;border-top:2px solid var(--border);padding-top:10px;">📁 ${proj.name}</div>`;
      for (const cat of ['characters', 'scenes', 'props']) {
        const imgs = proj.assets[cat] || {};
        if (!Object.keys(imgs).length) continue;
        projHasContent = true;
        projHtml += `<div class="asset-cat-title">${catLabel[cat]}</div><div class="asset-grid">`;
        projHtml += renderAssetCategory(imgs, cat);
        projHtml += '</div>';
      }
      if (projHasContent) html += projHtml;
    }
  } catch (_) {}

  if (!html) {
    html = '<div style="padding:16px;color:var(--text3);font-size:11px;">暂无参考图资产<br>请先在"参考图"节点生成或上传图片</div>';
  }
  body.innerHTML = html;
}

function onAssetDragStart(e, cat, name, url) {
  e.dataTransfer.setData('application/x-asset', JSON.stringify({ cat, name, url: decodeURI(url) }));
  e.dataTransfer.effectAllowed = 'copy';
}

function onAssetDragOver(e) {
  const hasAsset = e.dataTransfer.types.includes('application/x-asset');
  if (hasAsset) {
    e.preventDefault();
    e.currentTarget.classList.add('drag-over-asset');
  }
}

function onAssetDragLeave(e) {
  e.currentTarget.classList.remove('drag-over-asset');
}

async function onAssetDrop(e, targetCat, targetName) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over-asset');
  const raw = e.dataTransfer.getData('application/x-asset');
  if (!raw) return;
  try {
    const { url } = JSON.parse(raw);
    if (!requireProject() || !url) return;
    // 把资产图片复制到目标位置
    await apiCall('/api/workflow/set-ref-image', {
      projectPath: currentProject, category: targetCat, name: targetName, imageUrl: url,
    });
    await loadRefImages();
    renderImagesFromCache();
    refreshAssetPanel();
    toast(`已将图片设为 ${targetName} 的参考图`);
  } catch (err) { toast('应用失败: ' + err.message, true); }
}

async function initSettingsPanel() {
  try {
    const cfg = await apiCall('/api/config');
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };
    set('cfg-url', cfg.apiUrl);
    set('cfg-key', cfg.apiKey);
    set('cfg-model', cfg.model || 'gpt-4o');

/** 加载配置档案下拉框 */
async function loadProfileList(activeProfile) {
  try {
    const r = await apiCall('/api/config/profiles');
    const sel = document.getElementById('cfg-profile-select');
    if (!sel) return;
    sel.innerHTML = '<option value="">-- 选择配置 --</option>';
    (r.profiles || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.textContent = p.name;
      if (p.name === (activeProfile || r.activeProfile)) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch {}
}

/** 选择配置档案 → 填充表单并自动保存生效 */
async function loadProfile(name) {
  if (!name) return;
  try {
    const r = await apiCall('/api/config/profiles');
    const profile = (r.profiles || []).find(p => p.name === name);
    if (!profile) return;
    const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v || ''; };
    set('cfg-url', profile.apiUrl);
    set('cfg-key', profile.apiKey);
    set('cfg-model', profile.model);
    set('cfg-img-url', profile.imageApiUrl);
    set('cfg-img-key', profile.imageApiKey);
    set('cfg-img-model', profile.imageModel);
    // 自动保存使配置立即生效
    await saveSettings();
  } catch {}
}

/** 保存当前表单为配置档案 */
async function saveProfile() {
  const name = await showInputDialog('保存配置档案', '请输入配置名称', document.getElementById('cfg-profile-select').value || '');
  if (!name) return;
  const data = {
    name,
    apiUrl: document.getElementById('cfg-url').value,
    apiKey: document.getElementById('cfg-key').value,
    model: document.getElementById('cfg-model').value,
    imageApiUrl: document.getElementById('cfg-img-url').value,
    imageApiKey: document.getElementById('cfg-img-key').value,
    imageModel: document.getElementById('cfg-img-model').value,
  };
  await apiCall('/api/config/profiles', data);

/** 自定义输入弹窗（替代 prompt()，Electron 不支持 prompt） */
function showInputDialog(title, message, defaultValue) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
    const box = document.createElement('div');
    box.style.cssText = 'background:#1e1e32;border:1px solid var(--border);border-radius:12px;padding:20px;width:400px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.5);';
    box.innerHTML = `
      <h3 style="margin:0 0 8px;color:var(--accent);">${escHtml(title)}</h3>
      <p style="margin:0 0 12px;font-size:12px;color:var(--text2);">${escHtml(message)}</p>
      <input type="text" id="input-dialog-val" class="p-input" style="width:100%;margin-bottom:12px;" value="${escHtml(defaultValue||'')}" autofocus>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button class="node-btn node-btn-secondary" id="input-dialog-cancel" style="padding:4px 14px;">取消</button>
        <button class="node-btn node-btn-primary" id="input-dialog-ok" style="padding:4px 14px;">确定</button>
      </div>
    `;
    overlay.appendChild(box);
    document.body.appendChild(overlay);
    const input = box.querySelector('#input-dialog-val');
    input.focus();
    const done = (val) => { overlay.remove(); resolve(val); };
    box.querySelector('#input-dialog-cancel').onclick = () => done(null);
    box.querySelector('#input-dialog-ok').onclick = () => done(input.value.trim() || null);
    input.onkeydown = e => { if (e.key === 'Enter') done(input.value.trim() || null); if (e.key === 'Escape') done(null); };
    overlay.onclick = e => { if (e.target === overlay) done(null); };
  });
}

/** 浮动小窗播放视频 */
let _pipCleanup = null;
function openPipPlayer(videoSrc, title) {
  // 清理旧监听器并移除旧小窗
  if (_pipCleanup) { _pipCleanup(); _pipCleanup = null; }
  document.querySelectorAll('.pip-player').forEach(el => el.remove());
  const pip = document.createElement('div');
  pip.className = 'pip-player';
  pip.style.cssText = 'right:20px;bottom:20px;width:360px;';
  pip.innerHTML = `
    <div class="pip-header" id="pip-drag-handle">
      <span class="pip-title">🎬 ${escHtml(title || '视频预览')}</span>
      <button class="pip-close" id="pip-close-btn">✕</button>
    </div>
    <video src="${escHtml(toImgSrc(videoSrc))}" controls autoplay style="width:100%;display:block;border-radius:0 0 8px 8px;"></video>`;
  document.body.appendChild(pip);

  // 拖拽
  const handle = pip.querySelector('#pip-drag-handle');
  let dragging = false, ox, oy;
  handle.addEventListener('mousedown', e => {
    dragging = true; ox = e.clientX - pip.offsetLeft; oy = e.clientY - pip.offsetTop;
    pip.style.right = 'auto'; pip.style.bottom = 'auto';
  });
  const onMove = e => {
    if (!dragging) return;
    pip.style.left = (e.clientX - ox) + 'px'; pip.style.top = (e.clientY - oy) + 'px';
  };
  const onUp = () => { dragging = false; };
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  const cleanup = () => {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    _pipCleanup = null;
  };
  _pipCleanup = cleanup;
  pip.querySelector('#pip-close-btn').addEventListener('click', () => {
    cleanup();
    pip.remove();
  });
}

// 视频元素加载后添加小窗弹出按钮 — 事件委托
document.addEventListener('loadeddata', e => {
  const video = e.target;
  if (video.tagName === 'VIDEO' && !video.dataset.pipBtn && !video.closest('.pip-player')) {
    video.dataset.pipBtn = '1';
    const btn = document.createElement('button');
    btn.textContent = '⬗';
    btn.title = '小窗播放';
    btn.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;padding:1px 4px;z-index:2;opacity:0.6;';
    btn.onmouseenter = () => btn.style.opacity = '1';
    btn.onmouseleave = () => btn.style.opacity = '0.6';
    btn.onclick = (ev) => {
      ev.stopPropagation();
      const card = video.closest('.prompt-card');
      const shotNum = card?.querySelector('.shot-num')?.textContent || '视频';
      openPipPlayer(video.src, shotNum);
    };
    video.parentElement.style.position = 'relative';
    video.parentElement.appendChild(btn);
  }
}, true);

function copyPrompt(btn) {
  const section = btn.closest('.pc-prompt-section') || btn.closest('.pc-section') || btn.parentElement;
  const ta = section.querySelector('textarea');
  if (!ta) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 800);
  });
}

/** 自动给 textarea 包裹复制按钮 */
function wrapTextareasWithCopy(root) {
  (root || document).querySelectorAll('textarea:not([data-copy-wrapped])').forEach(ta => {
    if (ta.closest('.prompt-ta-wrap')) return; // 已有包装的跳过
    ta.setAttribute('data-copy-wrapped', '1');
    const wrap = document.createElement('div');
    wrap.className = 'ta-wrap';
    ta.parentElement.insertBefore(wrap, ta);
    wrap.appendChild(ta);
    const btn = document.createElement('button');
    btn.className = 'ta-copy-btn';
    btn.textContent = '📋';
    btn.onclick = function() { copyPrompt(this); };
    wrap.appendChild(btn);
  });
}

/** 为分镜卡片生成关联参考图HTML */
function getShotRefHtml(shot) {
  const refs = [];
  // 关联角色参考图
  for (const name of (shot.characters || [])) {
    const url = cachedRefImages.characters[name];
    if (url) refs.push({ name, url, type: '👤' });
  }
  // 关联场景参考图（模糊匹配：支持带修饰语的场景名如"办公室·深夜"匹配"办公室"）
  if (shot.scene) {
    const scenes = cachedRefImages.scenes || {};
    const sceneUrl = scenes[shot.scene] || Object.entries(scenes).find(([k]) => shot.scene.includes(k) || k.includes(shot.scene))?.[1];
    if (sceneUrl) refs.push({ name: shot.scene, url: sceneUrl, type: '🏠' });
  }
  // 关联道具参考图
  for (const name of (shot.props || [])) {
    const url = cachedRefImages.props[name];
    if (url) refs.push({ name, url, type: '🔧' });
  }
  if (!refs.length) return '';
  return `<div class="shot-refs">
    <div class="shot-refs-label">📎 关联参考图</div>
    ${refs.map(r => `<div class="shot-ref-thumb" title="${r.type} ${escHtml(r.name)}">
      <img src="${escHtml(toImgSrc(r.url))}" alt="${escHtml(r.name)}">
      <div class="ref-tag">${escHtml(r.name)}</div>
    </div>`).join('')}
  </div>`;
}

/** 紧凑参考徽章 — 用于卡片头部 */
function getRefBadgesHtml(shot) {
  const items = [];
  for (const name of (shot.characters || [])) {
    const url = cachedRefImages.characters?.[name];
    items.push(url
      ? `<span class="pc-ref-badge ok" title="👤 ${escHtml(name)}"><img src="${escHtml(toImgSrc(url))}">👤${escHtml(name)}</span>`
      : `<span class="pc-ref-badge warn" title="👤 ${escHtml(name)} 缺图">👤${escHtml(name)}⚠</span>`);
  }
  if (shot.scene) {
    const scenes = cachedRefImages.scenes || {};
    const url = scenes[shot.scene] || Object.entries(scenes).find(([k]) => shot.scene.includes(k) || k.includes(shot.scene))?.[1];
    items.push(url
      ? `<span class="pc-ref-badge ok" title="🏠 ${escHtml(shot.scene)}"><img src="${escHtml(toImgSrc(url))}">🏠${escHtml(shot.scene)}</span>`
      : `<span class="pc-ref-badge warn" title="🏠 ${escHtml(shot.scene)} 缺图">🏠${escHtml(shot.scene)}⚠</span>`);
  }
  for (const name of (shot.props || [])) {
    const url = cachedRefImages.props?.[name];
    items.push(url
      ? `<span class="pc-ref-badge ok" title="🔧 ${escHtml(name)}"><img src="${escHtml(toImgSrc(url))}">🔧${escHtml(name)}</span>`
      : `<span class="pc-ref-badge warn" title="🔧 ${escHtml(name)} 缺图">🔧${escHtml(name)}⚠</span>`);
  }
  return items.join('');
}

    if (info.shotImageParams) {
      shotImageParams = { ...shotImageParams, ...info.shotImageParams };
      const sel = document.getElementById('sel-shot-img-model');
      const selR = document.getElementById('sel-shot-img-ratio');
      const ratioRow = document.getElementById('shot-img-ratio-row');
      if (sel) sel.value = shotImageParams.model;
      if (selR) selR.value = shotImageParams.aspectRatio;
      if (ratioRow) ratioRow.style.display = shotImageParams.model === 'jimeng' ? 'flex' : 'none';
    }

    // 加载参考图缓存
    await loadRefImages();

    // 参考图节点状态（渲染延后到 cachedAnalysis 加载之后）
    const hasAnyImage = Object.values(cachedRefImages).some(cat => Object.keys(cat).length > 0);
    if (hasAnyImage) {
      updateNodeState('images', 'done');
    }

    if (st.hasScript) {
      updateNodeState('script', 'done');
      setNodeExtra('script', '<div style="color:var(--success);">✓ 剧本已导入</div>');
      if (info.data.original || info.data.corrected) {
        const text = info.data.corrected || info.data.original;
        renderScriptOutput(text);
      }
    }

    if (info.data.analysis) {
      cachedAnalysis = info.data.analysis;
      updateNodeState('analyze', 'done');
      renderAnalysisOutput(info.data.analysis);
    }

    // 参考图渲染（需在 cachedAnalysis 之后，才能显示未生成的空卡片）
    if (hasAnyImage || cachedAnalysis) {
      renderImagesFromCache();
    }

    if (info.data.chapters) {
      updateNodeState('chapters', 'done');
      renderChaptersOutput(info.data.chapters);
    }

    if (info.data.shotPlans) {
      updateNodeState('shots', 'done');
      renderShotsOutput(info.data.shotPlans);
    }

    if (info.data.shots) {
      cachedShots = info.data.shots;
      // 同步 Step 5 的角色/场景/道具数据以 Step 4 为准
      if (info.data.shotPlans) {
        for (let i = 0; i < cachedShots.length; i++) {
          const sp = info.data.shotPlans[i];
          if (sp) {
            cachedShots[i].characters = [...(sp.characters || [])];
            cachedShots[i].scene = sp.scene || cachedShots[i].scene;
            cachedShots[i].props = [...(sp.props || [])];
          }
        }
      }
      updateNodeState('prompts', 'done');
      renderPromptsOutput(info.data.shots);
      renderTimeline();
    }

    // 恢复进行中的视频任务监控
    resumePendingVideoTasks();

    // 加载转换预设列表
    loadConvertPresets();
    // 加载提示词生成预设
    loadPromptGenPresets();
  } catch (e) {
    console.error('[loadProjectData] error:', e);
    throw e;
  }
}

/** 设置视觉风格 */
function setStyle(val) {
  visualStyle = (val || '').trim();
  // 同步所有同名输入框
  document.querySelectorAll('.style-input').forEach(el => { if (el.value !== visualStyle) el.value = visualStyle; });
  if (currentProject && visualStyle) {
    apiCall('/api/project/set-style', { projectPath: currentProject, visualStyle }).catch(() => {});
  }
}
function requireStyle() {
  if (!visualStyle.trim()) { toast('请先填写视觉风格（如：写实、3D动漫、赛博朋克 等）', true); return false; }
  return true;
}

async function importScriptFile() {
  const fp = await window.api.selectFile([{ name: '文本', extensions: ['txt', 'md'] }]);
  if (!fp || !requireProject()) return;
  try {
    await apiCall('/api/workflow/import-script', { projectPath: currentProject, filePath: fp });
    loadProjectData();
    toast('剧本已导入');
  } catch (e) {
    toast('❌ 导入失败: ' + e.message, true);
  }
}

async function runStep1() {
  if (!requireProject()) return;
  const input = document.getElementById('script-input');
  const text = input ? input.value : '';
  if (!text.trim()) return toast('请先输入或导入剧本', true);

    await apiCall('/api/workflow/import-script', { projectPath: currentProject, scriptText: text });
    setNodeMsg('script', '✅ 剧本已保存');

    renderScriptOutput(text);
    toast('剧本已保存');
  } catch (e) {
    setNodeMsg('script', '❌ ' + e.message);

}

function renderScriptOutput(text) {
  setOutput('script', `
    <div class="script-output">
      <div class="script-label">📄 剧本内容</div>
      <textarea class="script-ta" id="script-input" rows="6">${escHtml(text)}</textarea>
      <div class="style-selector">
        <label>🎨 视觉风格：</label>

// ============================

async function runStep2() {
  if (!requireProject() || !requireStyle()) return;
  setNodeMsg('analyze', '提取中...', true);
  updateNodeState('analyze', 'running');
  try {
    const r = await apiCall('/api/workflow/analyze', { projectPath: currentProject });
    cachedAnalysis = r.analysis;
    setNodeMsg('analyze', '✅ 完成');
    updateNodeState('analyze', 'done');
    renderAnalysisOutput(r.analysis);
    // 清理不在新分析中的旧参考图
    await loadRefImages();
    for (const cat of ['characters', 'scenes', 'props']) {
      const newNames = new Set((r.analysis?.[cat] || []).map(i => i.name));
      for (const oldName of Object.keys(cachedRefImages[cat] || {})) {
        if (!newNames.has(oldName)) {
          delete cachedRefImages[cat][oldName];
          apiCall('/api/workflow/delete-ref-image', { projectPath: currentProject, category: cat, name: oldName }).catch(() => {});
        }
      }
    }
    renderImagesFromCache();
  } catch (e) {
    setNodeMsg('analyze', '❌ ' + e.message);
    updateNodeState('analyze', 'idle');
  }
}

async function runStepChapters() {
  if (!requireProject() || !requireStyle()) return;
